<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futsal Manager Pro v12.FINAL</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary-color: #0f172a; --accent-color: #10b981; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 13px; }
    .container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 15px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    header { text-align: center; margin-bottom: 12px; }
    h1 { font-size: 1.3rem; font-weight: 900; color: var(--primary-color); margin: 0; letter-spacing: -1.2px; text-transform: uppercase; }
    .team-title-label { font-size: 13px; font-weight: 700; color: var(--accent-color); margin-top: 2px; display: block; }
    .section-title { font-size: 9px; font-weight: 800; margin: 12px 0 6px; color: var(--text-sub); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 3px; }
    
    #saved-matches-section { margin-bottom: 15px; }
    .saved-match-card { background: #f0fdf4; border: 1px solid #dcfce7; border-radius: 18px; padding: 12px; display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .date-badge { background: var(--accent-color); color: white; padding: 4px 12px; border-radius: 50px; font-weight: 900; font-size: 12.5px; margin-left: 5px; box-shadow: 0 2px 4px rgba(16,185,129,0.2); }
    .admin-del { color: #f87171; cursor: pointer; font-weight: 900; margin-left: 8px; padding: 0 4px; }

    .loading-dots:after { content: ' .'; animation: dots 0.65s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--text-sub); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--text-sub), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--text-sub), 1em 0 0 var(--text-sub); } }
    #loading { min-height: 44px; }

    .simple-config-bar { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 8px 12px; border-radius: 14px; border: 1px solid #e2e8f0; margin-bottom: 12px; }
    .match-type-selector { display: flex; gap: 5px; flex: 1; }
    .type-btn { flex: 1; padding: 8px 0; border: 1px solid #cbd5e1; background: white; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 10.5px; color: var(--text-sub); }
    .type-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }

    .vs-grid { display: flex; gap: 8px; align-items: stretch; margin-top: 5px; overflow-x: auto; padding-bottom: 5px; }
    .team-column { flex: 1; min-width: 165px; display: flex; flex-direction: column; gap: 8px; }
    .team-box { background: #f8fafc; border-radius: 14px; padding: 10px; border: 1px solid #e2e8f0; flex: 1; }
    .drag-list { min-height: 120px; background: rgba(255,255,255,0.5); border-radius: 10px; border: 1px dashed #cbd5e1; padding: 4px; }
    .drag-item { background: white; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; border: 1px solid #e2e8f0; font-weight: 700; font-size: 10.5px; display: flex; justify-content: space-between; align-items: center; }

    .tactical-card { background: #111827; color: #fff; padding: 10px; border-radius: 14px; text-align: center; }
    .ovr-val { font-size: 24px; font-weight: 900; color: var(--accent-color); line-height: 1; }
    .chart-mini-box { background: rgba(255,255,255,0.03); border-radius: 10px; height: 160px; position: relative; margin-top: 3px; }

    .match-card { background: #f8fafc; border-radius: 14px; padding: 8px 12px; margin-bottom: 6px; border: 1px solid #e2e8f0; display: flex; flex-direction: row !important; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
    .round-info { font-size: 10px; font-weight: 900; color: var(--accent-color); min-width: 35px; white-space: nowrap; }
    .vs-area { display: flex; flex-direction: row !important; align-items: center; flex: 1; gap: 10px; justify-content: center; }
    .team-label { font-weight: 900; font-size: 11px; min-width: 25px; text-align: center; }
    .score-btns { display: flex; flex-direction: row !important; gap: 4px; flex: 1; max-width: 170px; }
    .s-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .s-btn.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    button { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 13px; margin-top: 6px; }
    .btn-accent { background: var(--accent-color); height: 50px; font-size: 15px; }
    .btn-save-plan { background: var(--primary-color); border: 2px solid var(--primary-color); color: white; font-weight: 900; }
    .btn-outline { background: transparent; color: var(--text-sub); border: 1px solid #e2e8f0; }

    .attendance-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; max-height: 250px; overflow-y: auto; }
    .player-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 5px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; font-size: 11px; -webkit-user-select: none; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; font-weight: 800; }
    .hidden { display: none !important; }

    .match-date-card { background: #fff; border: 2px solid var(--accent-color); padding: 12px 14px; border-radius: 16px; margin-top: 12px; box-shadow: 0 4px 12px rgba(16,185,129,0.1); display: flex; flex-direction: column; align-items: stretch; gap: 8px; width: 100%; }
    .match-date-label { font-size: 10px; font-weight: 900; color: var(--accent-color); letter-spacing: 0.06em; text-transform: uppercase; }
    .match-date-row { display: flex; align-items: center; justify-content: stretch; width: 100%; min-height: 44px; padding: 6px 10px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    .match-date-input { width: 100%; min-width: 0; border: none; background: transparent; font-family: inherit; font-weight: 800; color: var(--primary-color); font-size: 15px; cursor: pointer; text-align: left; line-height: 1.2; }
    .leaderboard-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #eee; }
    .leaderboard-table th { background: #f8fafc; padding: 10px; text-align: left; color: var(--text-sub); font-size: 9px; }
    .leaderboard-table td { padding: 10px; border-bottom: 1px solid #f8fafc; }
    .prob-badge { background: #ecfdf5; color: #059669; padding: 2px 6px; border-radius: 6px; font-weight: 800; font-size: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div id="setup-page">
    <header><h1>Futsal Manager Pro</h1><span id="display-team-name" class="team-title-label"></span></header>
    <div id="sheet-sync-note" class="hidden" style="font-size:11px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 10px;margin:8px 0 0;text-align:center;font-weight:600;line-height:1.35;"></div>
    
    <div id="saved-matches-section" class="hidden">
        <div class="section-title">Ready to Play</div>
        <div id="saved-list"></div>
    </div>

    <div class="section-title">Quick Settings</div>
    <div class="simple-config-bar">
      <div class="match-type-selector">
        <button id="btn-2team" class="type-btn active" onclick="setTeamCount(2)">2-TEAMS</button>
        <button id="btn-3team" class="type-btn" onclick="setTeamCount(3)">3-TEAMS</button>
      </div>
      <div id="att-count">0 Selected</div>
    </div>

    <div class="section-title">Attendance Checklist</div>
    <div id="loading" style="text-align: center; padding: 12px 10px; color: var(--text-sub); font-weight: 600;">
      Loading<span class="loading-dots"></span>
    </div>
    <div class="attendance-list" id="attendance-list"></div>
    <div id="guest-draft-area" style="margin-top:8px; display:flex; gap:4px; flex-wrap: wrap;"></div>
    <button class="btn-outline" onclick="addDraftGuest()">+ Add Guest Player</button>
    <button class="btn-accent" onclick="makeTeams()">Draft Teams ⚡</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color:var(--accent-color);">Match Briefing</h1></header>
    <div id="vs-display-grid" class="vs-grid"></div>
    <div class="match-date-card">
      <div class="match-date-label">Match date</div>
      <div class="match-date-row">
        <input type="date" id="match-date-input" class="match-date-input">
      </div>
    </div>
    
    <button id="shuffle-btn" class="btn-outline" style="margin-top: 12px; border-color: var(--accent-color); color: var(--accent-color);" onclick="reshuffle()">Reshuffle Squads</button>
    <button class="btn-outline" onclick="openAddPlayerModal()">+ Add Last-minute Player</button>
    <button class="btn-save-plan" onclick="saveMatchToHistory('exit')">Save Game Plan 💾</button>
    <button class="btn-accent" onclick="saveMatchToHistory('dashboard')">Start Game Now ⚽</button>
    <button class="btn-outline" style="border:none;" onclick="goBack('setup')">← Back to Setup</button>
  </div>

  <div id="match-page" class="hidden">
    <header><h1>Live Dashboard</h1></header>
    <div id="live-ranking" style="background:var(--primary-color); color:white; padding:10px; border-radius:14px; margin-bottom:12px; font-size:11px; text-align:center; font-weight:700;"></div>
    <div id="round-list"></div>
    <button class="btn-accent" onclick="finishMatch()">Complete & Archive 🏁</button>
    <button class="btn-outline" onclick="goBack('result')">← Back to Game Plan</button>
  </div>

  <div id="add-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 20px;">
    <div style="background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px;">
      <div class="section-title">Last-minute Entry</div>
      <div id="modal-player-list" class="attendance-list" style="margin-bottom:12px; grid-template-columns: 1fr 1fr;"></div>
      <button class="btn-outline" onclick="addDraftGuestModal()">+ Add New Guest</button>
      <button class="btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div id="history-section" style="margin-top: 30px;">
    <div class="section-title">Monthly Records</div>
    <div id="history-month-nav" style="display:none;justify-content:space-between;align-items:center;gap:10px;margin:4px 0 10px;"></div>
    <div id="history-list"></div>
    <div class="section-title">Player Power Rankings</div>
    <div id="leaderboard-area"></div>
  </div>
</div>

<script>
  const TEAM_NAME = "FC 서울숲";
  const ADMIN_PW = "1110023";
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzo_9mYhtzTFQ6oFh9Xd-RaVf6degYYeEI9mCNrgyyaku4jnjNKVo7WIBaf2otYIVwB/exec"; 
  const LOCAL_HISTORY_KEY = 'futsal_manager_local_history_v1';

  let masterPlayers = [], teamCount = 2, hData = [], activeMatch = null, charts = [], draftGuests = [], currentDraftSelection = [];
  let recordDedupeKey = '';
  let recordDedupeTs = 0;
  let historyMonthIndex = 0;

  const todayStr = new Date().toISOString().substring(0, 10);
  document.getElementById('match-date-input').value = todayStr;
  document.getElementById('display-team-name').innerText = TEAM_NAME;

  function getGuestScore() {
    return masterPlayers.length ? parseFloat((masterPlayers.reduce((s,p)=>s+p.score,0)/masterPlayers.length).toFixed(1)) : 5;
  }

  function monthKeyFromMatch(h) {
    const iso = h && (h.dateIso || '');
    if (typeof iso === 'string' && /^\d{4}-\d{2}-\d{2}/.test(iso)) return iso.slice(0, 7);
    const raw = String((h && h.date) || '');
    const mDot = raw.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
    if (mDot) return `${mDot[1]}-${String(mDot[2]).padStart(2, '0')}`;
    const mDash = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (mDash) return `${mDash[1]}-${mDash[2]}`;
    return 'unknown';
  }

  function formatMonthLabel(key) {
    if (!key || key === 'unknown') return '';
    const [y, mo] = key.split('-');
    if (y && mo) return `${y}년 ${parseInt(mo, 10)}월`;
    return '';
  }

  function displayDateFromMatch(h) {
    if (h && h.dateIso && /^\d{4}-\d{2}-\d{2}$/.test(h.dateIso)) {
      const [y, mo, d] = h.dateIso.split('-');
      return `${y}. ${mo}. ${d}.`;
    }
    return (h && h.date) ? h.date : '';
  }

  function loadLocalHistory() {
    try {
      const raw = localStorage.getItem(LOCAL_HISTORY_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) { return []; }
  }

  function saveLocalHistory() {
    try {
      if (Array.isArray(hData) && hData.length) localStorage.setItem(LOCAL_HISTORY_KEY, JSON.stringify(hData));
      else localStorage.removeItem(LOCAL_HISTORY_KEY);
    } catch (e) { /* quota */ }
  }

  function mergeHistoryById(serverArr, localArr) {
    const map = new Map();
    (Array.isArray(localArr) ? localArr : []).forEach(h => { if (h && h.id != null) map.set(Number(h.id), h); });
    (Array.isArray(serverArr) ? serverArr : []).forEach(h => { if (h && h.id != null) map.set(Number(h.id), h); });
    return Array.from(map.values()).sort((a, b) => Number(b.id) - Number(a.id));
  }

  function setSyncNote(msg) {
    const el = document.getElementById('sheet-sync-note');
    if (!el) return;
    if (!msg) { el.classList.add('hidden'); el.textContent = ''; return; }
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  async function fetchMasterData() {
    const loadingEl = document.getElementById('loading');
    const setLoadingVisible = () => { loadingEl.classList.remove('hidden'); loadingEl.innerHTML = 'Loading<span class="loading-dots"></span>'; loadingEl.style.textAlign = 'center'; loadingEl.style.color = 'var(--text-sub)'; };
    const showSyncFailed = () => {
      loadingEl.classList.remove('hidden');
      loadingEl.style.textAlign = 'center';
      loadingEl.style.color = '#b91c1c';
      loadingEl.innerHTML = '<div style="font-weight:800;margin-bottom:6px;">동기화 실패</div><div style="font-size:11px;color:#64748b;line-height:1.4;margin-bottom:10px;">네트워크·웹앱 배포 URL·실행 권한(누구나)을 확인해 주세요.<br>HTML을 파일로만 열면 구글 요청이 차단될 수 있습니다.</div><button type="button" class="btn-outline" style="margin-top:0;" onclick="fetchMasterData()">다시 시도</button>';
    };
    setSyncNote('');
    setLoadingVisible();
    try {
      const response = await fetch(SHEET_API_URL, { method: 'GET', mode: 'cors', cache: 'no-store', redirect: 'follow', headers: { Accept: 'application/json,text/plain,*/*' } });
      const text = (await response.text()).replace(/^\uFEFF/, '').trim();
      let result;
      try {
        result = JSON.parse(text);
      } catch (parseErr) {
        console.error('JSON parse error', parseErr, text.slice(0, 400));
        throw parseErr;
      }
      if (result && result.data && typeof result.data === 'object') result = result.data;
      let players = result.players != null ? result.players : result.Players;
      masterPlayers = Array.isArray(players) ? players : (players && typeof players === 'object' ? Object.values(players) : []);
      masterPlayers = masterPlayers.map(p => ({
        name: String(p.name != null ? p.name : (p.Name != null ? p.Name : (p.n != null ? p.n : ''))).trim(),
        score: Number(p.score != null ? p.score : (p.Score != null ? p.Score : (p.s != null ? p.s : 0))) || 0
      })).filter(p => p.name);
      let hist = result.history != null ? result.history : result.History;
      const serverHist = Array.isArray(hist) ? hist : [];
      const localHist = loadLocalHistory();
      hData = mergeHistoryById(serverHist, localHist);
      saveLocalHistory();
      loadingEl.classList.add('hidden');
      if (!masterPlayers.length) setSyncNote('시트에서 명단(players)을 불러오지 못했습니다. 시트/스크립트 응답을 확인해 주세요.');
      renderAttendanceList();
      renderHistory();
      renderSavedMatches();
    } catch (e) {
      console.error(e);
      const localH = loadLocalHistory();
      if (localH.length) {
        hData = localH;
        masterPlayers = [];
        loadingEl.classList.add('hidden');
        setSyncNote('구글 시트와 연결하지 못했습니다. 이 기기에 저장된 경기 기록·랭킹만 표시합니다. (명단은 시트 연결 후 다시 받아옵니다)');
        renderAttendanceList();
        renderHistory();
        renderSavedMatches();
      } else {
        masterPlayers = [];
        hData = [];
        showSyncFailed();
        renderAttendanceList();
        renderHistory();
        renderSavedMatches();
      }
    }
  }

  function setTeamCount(val) {
    teamCount = val;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    val === 2 ? document.getElementById('btn-2team').classList.add('active') : document.getElementById('btn-3team').classList.add('active');
  }

  function renderAttendanceList() {
    const box = document.getElementById('attendance-list'); box.innerHTML = '';
    masterPlayers.sort((a,b)=>a.name.localeCompare(b.name,'ko-KR')).forEach(p=>{
      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `<span class="p-name" data-score="${p.score}">${p.name}</span>`;
      const handleToggle = (e) => { e.preventDefault(); card.classList.toggle('active'); updateCount(); };
      card.addEventListener('touchstart', handleToggle, {passive: false});
      card.addEventListener('click', (e) => { if (e.pointerType !== 'touch') { card.classList.toggle('active'); updateCount(); } });
      box.appendChild(card);
    });
  }

  function updateCount() {
    const activeCards = document.querySelectorAll('#attendance-list .player-card.active');
    document.getElementById('att-count').innerText = `${activeCards.length + draftGuests.length} Selected`;
  }

  function addDraftGuest() {
    draftGuests.push({ n: `Guest ${draftGuests.length+1}`, s: getGuestScore() });
    renderDraftGuests(); updateCount();
  }

  function renderDraftGuests() {
    const area = document.getElementById('guest-draft-area');
    area.innerHTML = draftGuests.map((g,i)=>`<div style="background:#e2e8f0; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">${g.n} <span style="cursor:pointer;" onclick="draftGuests.splice(${i},1);renderDraftGuests();updateCount();">✕</span></div>`).join('');
  }

  function makeTeams() {
    currentDraftSelection = Array.from(document.querySelectorAll('#attendance-list .player-card.active')).map(el=>{
      const s = el.querySelector('.p-name'); return { n: s.innerText, s: parseFloat(s.dataset.score) };
    });
    currentDraftSelection = [...currentDraftSelection, ...draftGuests];
    if(currentDraftSelection.length < teamCount) return alert("인원 부족");
    document.getElementById('shuffle-btn').classList.remove('hidden');
    let sel = [...currentDraftSelection]; sel.sort((a,b)=>b.s-a.s);
    let teams = Array.from({length:teamCount}, ()=>({members:[]}));
    let idx=0, dir=1; sel.forEach(p=>{ teams[idx].members.push(p); idx+=dir; if(idx===teamCount||idx===-1){dir*=-1;idx+=dir;} });
    renderVSMode(teams);
  }

  function reshuffle() {
    let currentPlayers = [];
    document.querySelectorAll('.drag-item').forEach(el => {
      const s = parseFloat(el.dataset.score);
      const n = el.childNodes[0].textContent.trim();
      currentPlayers.push({ n, s });
    });
    if(currentPlayers.length < teamCount) return;
    currentPlayers.sort(() => Math.random() - 0.5);
    let teams = Array.from({length:teamCount}, ()=>({members:[]}));
    currentPlayers.forEach((p, idx) => teams[idx % teamCount].members.push(p));
    renderVSMode(teams);
  }

  function renderVSMode(teams) {
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    const grid = document.getElementById('vs-display-grid'); grid.innerHTML = '';
    charts.forEach(c=>c.destroy()); charts = [];
    teams.forEach((t, i)=>{
      t.members.sort((a,b)=>a.n.localeCompare(b.n,'ko-KR'));
      grid.innerHTML += `
        <div class="team-column">
          <div class="team-box"><div class="section-title" style="margin:0 0 5px;">T${i+1} Squad</div><div class="drag-list" id="team-list-${i}"></div></div>
          <div class="tactical-card"><div class="ovr-lbl">Rating</div><div class="ovr-val" id="ovr-${i}">--</div><div class="chart-mini-box"><canvas id="radar-${i}"></canvas></div></div>
        </div>`;
      setTimeout(()=>{
        const listEl = document.getElementById(`team-list-${i}`);
        t.members.forEach(p=>{ listEl.innerHTML += `<div class="drag-item" data-score="${p.s}">${p.n}<span style="cursor:pointer;" onclick="this.parentElement.remove();autoAnalyze();">✕</span></div>`; });
        new Sortable(listEl, { group:'teams', animation:150, onEnd:autoAnalyze });
        autoAnalyze();
      },0);
    });
  }

  function autoAnalyze() {
    document.querySelectorAll('.team-column').forEach((col, i)=>{
      const items = col.querySelectorAll('.drag-item');
      let total = 0; items.forEach(it=>total+=parseFloat(it.dataset.score));
      const avg = items.length>0 ? total/items.length : 0;
      const base = avg*10; const stats = [base+5,base+2,base+7,base+3,base+1,base+4].map(s=>Math.min(99,Math.floor(s)));
      const ovrEl = document.getElementById(`ovr-${i}`);
      
      if(items.length >= 5) { 
        ovrEl.innerText = Math.floor(stats.reduce((a,b)=>a+b)/6); 
        ovrEl.style.fontSize = '24px'; 
      } else if(items.length > 0) { 
        ovrEl.innerText = "--"; 
        ovrEl.style.fontSize = '24px'; 
      } else { 
        ovrEl.innerText = "--"; 
        ovrEl.style.fontSize = '24px'; 
      }
      const cData = items.length >= 5 ? stats : [0,0,0,0,0,0];
      const ctx = document.getElementById(`radar-${i}`).getContext('2d');
      if(charts[i]) charts[i].destroy();
      charts[i] = new Chart(ctx, {
        type:'radar', data:{ labels:['ATT','DEF','SPD','PAS','STA','ORG'], datasets:[{data:cData,backgroundColor:'rgba(16,185,129,0.2)',borderColor:'#10b981',borderWidth:2,pointRadius:0}]},
        options:{ scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'rgba(255,255,255,0.1)'},pointLabels:{color:'#94a3b8',font:{size:8,weight:'bold'}}}}, plugins:{legend:{display:false}}, responsive:true, maintainAspectRatio:false }
      });
    });
  }

  function saveMatchToHistory(mode) {
    const finalTeams = [];
    document.querySelectorAll('.drag-list').forEach((list,idx)=>{
      const members = Array.from(list.querySelectorAll('.drag-item')).map(el=>el.childNodes[0].textContent.trim());
      finalTeams.push({ id:idx, members:members, ovr: document.getElementById(`ovr-${idx}`).innerText });
    });
    const iso = document.getElementById('match-date-input').value;
    activeMatch = { id:Date.now(), date: iso.replace(/-/g, '. '), dateIso: iso, teams:finalTeams, rounds:[] };
    localStorage.setItem('saved_manager_match', JSON.stringify(activeMatch));
    if(mode==='dashboard') startDashboard(activeMatch); else { alert("Saved!"); location.reload(); }
  }

  function renderSavedMatches() {
    const mStr = localStorage.getItem('saved_manager_match');
    const section = document.getElementById('saved-matches-section');
    if(mStr) {
      const m = JSON.parse(mStr); section.classList.remove('hidden');
      document.getElementById('saved-list').innerHTML = `<div class="saved-match-card"><div onclick="loadSavedMatch()" style="flex:1; font-weight:800; color:#065f46; font-size:11px; cursor:pointer;">⚽ Match Day: <span class="date-badge">${m.date}</span></div><span class="admin-del" onclick="deleteLocalMatch()">✕</span></div>`;
    } else { section.classList.add('hidden'); }
  }

  function deleteLocalMatch() {
    if(prompt("Password:") === ADMIN_PW) { localStorage.removeItem('saved_manager_match'); renderSavedMatches(); }
  }

  function loadSavedMatch() {
    activeMatch = JSON.parse(localStorage.getItem('saved_manager_match'));
    document.getElementById('shuffle-btn').classList.add('hidden');
    document.getElementById('match-date-input').value = activeMatch.dateIso || activeMatch.date.replace(/\. /g, '-');
    renderVSMode(activeMatch.teams.map(t=>({ members: t.members.map(n=>({n, s: (masterPlayers.find(p=>p.name===n)||{score:getGuestScore()}).score}))})));
    if (activeMatch.rounds && activeMatch.rounds.some(r => r.winner !== null)) {
      if (confirm("이전에 기록하던 경기 데이터가 있습니다. 대시보드로 바로 이동할까요?")) {
        startDashboard(activeMatch);
      }
    }
  }

  function startDashboard(m) {
    activeMatch = m;
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.add('hidden');
    document.getElementById('match-page').classList.remove('hidden');
    if(activeMatch.rounds.length===0) {
      const tc = activeMatch.teams.length;
      if(tc===2) for(let i=1;i<=9;i++) activeMatch.rounds.push({id:i, t1:0, t2:1, winner:null});
      else { const p=[[0,1],[1,2],[2,0]]; for(let i=1;i<=9;i++) activeMatch.rounds.push({id:i, t1:p[(i-1)%3][0], t2:p[(i-1)%3][1], winner:null}); }
    }
    renderRoundList();
  }

  function renderRoundList() {
    const box = document.getElementById('round-list'); box.innerHTML = '';
    activeMatch.rounds.forEach(r=>{
      box.innerHTML += `
        <div class="match-card">
          <div class="round-info">RD ${r.id}</div>
          <div class="vs-area">
            <span class="team-label">T${r.t1+1}</span>
            <div class="score-btns">
              <button class="s-btn ${r.winner==='t1'?'selected':''}" onclick="record(${r.id},'t1')">WIN</button>
              <button class="s-btn ${r.winner==='draw'?'selected':''}" onclick="record(${r.id},'draw')">DRAW</button>
              <button class="s-btn ${r.winner==='t2'?'selected':''}" onclick="record(${r.id},'t2')">WIN</button>
            </div>
            <span class="team-label">T${r.t2+1}</span>
          </div>
        </div>`;
    });
    updateLiveRanking();
  }

  function record(rid, res) { 
    const now = Date.now();
    const dedupeKey = `${rid}:${res}`;
    if (dedupeKey === recordDedupeKey && now - recordDedupeTs < 450) return;
    recordDedupeKey = dedupeKey;
    recordDedupeTs = now;
    const r = activeMatch.rounds.find(x=>x.id===rid); 
    r.winner = (r.winner===res)?null:res; 
    localStorage.setItem('saved_manager_match', JSON.stringify(activeMatch));
    renderRoundList(); 
  }

  function updateLiveRanking() {
    const s = activeMatch.teams.map((_,i)=>({id:i+1,w:0,d:0,l:0,p:0}));
    activeMatch.rounds.forEach(r=>{
      if(!r.winner) return;
      if(r.winner==='t1'){ s[r.t1].w++; s[r.t1].p+=3; s[r.t2].l++; }
      else if(r.winner==='t2'){ s[r.t2].w++; s[r.t2].p+=3; s[r.t1].l++; }
      else { s[r.t1].d++; s[r.t1].p+=1; s[r.t2].d++; s[r.t2].p+=1; }
    });
    s.sort((a,b)=>b.p-a.p);
    document.getElementById('live-ranking').innerHTML = s.map(x=>`T${x.id}: ${x.w}W ${x.d}D ${x.l}L`).join(' | ');
  }

  // [가장 완벽했던 초창기 코드로 100% 원복] Fire & Forget 로직
  function finishMatch() {
    if(!confirm("Cloud Archive?")) return; 
    
    document.body.style.opacity = "0.5";
    
    const st = activeMatch.teams.map((t, tid)=>{
      let w=0,d=0,l=0,p=0; 
      activeMatch.rounds.forEach(r=>{ 
        if(r.winner==='t1'&&r.t1===tid){w++;p+=3;} 
        else if(r.winner==='t2'&&r.t2===tid){w++;p+=3;} 
        else if(r.winner==='draw'&&(r.t1===tid||r.t2===tid)){d++;p+=1;} 
        else if(r.winner&&(r.t1===tid||r.t2===tid)) l++; 
      });
      return { names:t.members.join(','), ovr:t.ovr, record:`${w}W ${d}D ${l}L`, pts:p };
    });
    st.sort((a,b)=>b.pts - a.pts);
    
    const log = { id:activeMatch.id, date:activeMatch.date, dateIso: activeMatch.dateIso || null, rank:st.map((s,i)=>({r:i+1,sfx:i===0?'st':i===1?'nd':'rd',names:s.names,ovr:s.ovr,record:s.record,pts:s.pts})), rounds:activeMatch.rounds };

    // 1. 구글 서버로 데이터 전송 (응답을 기다리거나 강제 검증하지 않음)
    fetch(SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(log)
    }).catch(e => console.log("Sync bypassed")); 

    // 2. 딜레이 없이 팀장님 폰 화면의 로컬 데이터를 즉시 최신화 (가장 빠르고 확실한 반영)
    localStorage.removeItem('saved_manager_match'); 
    if (!Array.isArray(hData)) hData = [];
    hData.push(log); 
    saveLocalHistory();
    
    document.body.style.opacity = "1";
    document.getElementById('match-page').classList.add('hidden');
    document.getElementById('setup-page').classList.remove('hidden');
    
    renderHistory(); 
    renderSavedMatches();
    
    setTimeout(() => { alert("Archived Successfully! 🏆"); }, 50);
  }

  function historyMonthNav(delta) {
    historyMonthIndex = (historyMonthIndex || 0) + delta;
    renderHistory();
  }

  function renderHistory() {
    const box = document.getElementById('history-list');
    const navEl = document.getElementById('history-month-nav');
    box.innerHTML = '';
    if (!hData || hData.length === 0) {
      if (navEl) { navEl.innerHTML = ''; navEl.style.display = 'none'; }
      renderLeaderboard();
      return;
    }
    if (navEl) navEl.style.display = 'flex';

    const groups = [...hData].sort((a,b)=>b.id-a.id).reduce((acc,h)=>{
      const key = monthKeyFromMatch(h);
      if(!acc[key]) acc[key]=[];
      acc[key].push(h);
      return acc;
    },{});

    const monthKeys = Object.keys(groups).sort((a,b) => {
      if (a === 'unknown') return 1;
      if (b === 'unknown') return -1;
      return b.localeCompare(a);
    });

    historyMonthIndex = Math.max(0, Math.min(historyMonthIndex || 0, monthKeys.length - 1));
    const curKey = monthKeys[historyMonthIndex];

    if (navEl) {
      if (monthKeys.length <= 1) {
        navEl.innerHTML = `<div style="flex:1;text-align:center;font-weight:900;font-size:12px;color:var(--primary-color);">${formatMonthLabel(curKey)}</div>`;
      } else {
        const atOldest = historyMonthIndex >= monthKeys.length - 1;
        const atNewest = historyMonthIndex <= 0;
        navEl.innerHTML = `
          <button type="button" class="btn-outline" style="margin-top:0;flex:0 0 auto;padding:10px 12px;max-width:40%;" ${atOldest ? 'disabled' : ''} onclick="historyMonthNav(1)">‹ 과거</button>
          <div style="flex:1;text-align:center;font-weight:900;font-size:12px;color:var(--primary-color);">${formatMonthLabel(curKey)}</div>
          <button type="button" class="btn-outline" style="margin-top:0;flex:0 0 auto;padding:10px 12px;max-width:40%;" ${atNewest ? 'disabled' : ''} onclick="historyMonthNav(-1)">최근 ›</button>`;
      }
    }

    let mHtml = '';
    (groups[curKey] || []).forEach(h=>{
      const dateStr = displayDateFromMatch(h);
      let teamsBlock = '';
      (Array.isArray(h.rank) ? h.rank : []).forEach(rk=>{
        const rec = (rk.record != null && rk.record !== '') ? ` · <span style="color:#64748b;font-weight:700;">${rk.record}</span>` : '';
        teamsBlock += `<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;">
          <div style="font-size:11px;font-weight:800;color:var(--primary-color);line-height:1.35;"><b>${rk.r}${rk.sfx}</b> · <span style="color:var(--accent-color);">${rk.pts}pt</span>${rec}</div>
          <div style="font-size:10px;color:#64748b;margin-top:3px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${rk.names || ''}</div>
        </div>`;
      });
      let roundLine = '';
      if (h.rounds && h.rounds.length) {
        roundLine = `<div style="font-size:10px;color:#475569;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;line-height:1.45;">` +
          h.rounds.map(r => {
            let tag = '—';
            if (r.winner === 't1') tag = `T${r.t1 + 1}승`;
            else if (r.winner === 't2') tag = `T${r.t2 + 1}승`;
            else if (r.winner === 'draw') tag = '무';
            return `<b>R${r.id}</b> ${tag}`;
          }).join(' · ') + `</div>`;
      }
      mHtml += `<div class="history-card" style="background:#fff;padding:12px;border-radius:12px;border:1px solid #eee;margin-bottom:10px;position:relative;">
        <div style="font-size:11px;font-weight:900;margin-bottom:6px;">${dateStr}<span class="admin-del" style="position:absolute;top:10px;right:10px;" onclick="deleteCloudMatch(${h.id})">✕</span></div>
        ${teamsBlock}
        ${roundLine}
      </div>`;
    });
    box.innerHTML = `<div class="history-month-group">${mHtml}</div>`;
    renderLeaderboard();
  }

  function deleteCloudMatch(id) {
    if(prompt("Admin Password:") === ADMIN_PW) { 
      if(!confirm("영구 삭제?")) return; 
      // 삭제 역시 초창기 방식(Fire & Forget)으로 원복
      fetch(SHEET_API_URL, { 
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({action: "DELETE", id: id}) 
      }).catch(e => console.log("Bypass"));
      
      hData = hData.filter(h => h.id !== id);
      saveLocalHistory();
      renderHistory();
      alert("Deleted!"); 
    }
  }

  function renderLeaderboard() {
    const stats = {}; hData.forEach(h => { if (!h || !Array.isArray(h.rank)) return; h.rank.forEach(rk => { const names = rk.names.split(',').map(n=>n.trim()); names.forEach(name => { if(name.toLowerCase().includes('guest')) return; if(!stats[name]) stats[name] = { play:0, win:0 }; stats[name].play++; if(rk.r === 1) stats[name].win++; }); }); });
    const sorted = Object.entries(stats).sort((a,b) => (b[1].win/b[1].play) - (a[1].win/a[1].play) || b[1].play - a[1].play).slice(0,20);
    const winProbPctInt = (s) => (s.play ? Math.round((s.win / s.play) * 100) : -1);
    let html = `<table class="leaderboard-table"><thead><tr><th>RANK</th><th>PLAYER</th><th>WIN PROB.</th><th>WIN</th><th>GAMES</th></tr></thead><tbody>`;
    sorted.forEach(([name, s], i) => {
      let rank = 1;
      for (let j = 0; j < i; j++) {
        if (winProbPctInt(sorted[j][1]) !== winProbPctInt(s)) rank++;
      }
      html += `<tr><td><b>${rank}</b></td><td>${name}</td><td><span class="prob-badge">${((s.win/s.play)*100).toFixed(0)}%</span></td><td>${s.win}승</td><td>${s.play}회</td></tr>`;
    });
    document.getElementById('leaderboard-area').innerHTML = html + `</tbody></table>`;
  }

  function goBack(step) {
    if(step==='setup') { document.getElementById('result-page').classList.add('hidden'); document.getElementById('setup-page').classList.remove('hidden'); renderSavedMatches(); }
    else if(step==='result') { document.getElementById('match-page').classList.add('hidden'); document.getElementById('result-page').classList.remove('hidden'); }
  }
  function openAddPlayerModal() {
    const cur = Array.from(document.querySelectorAll('.drag-item')).map(el=>el.childNodes[0].textContent.trim());
    const box = document.getElementById('modal-player-list'); box.innerHTML = '';
    masterPlayers.filter(p=>!cur.includes(p.name)).forEach(p=>{ box.innerHTML += `<div class="player-card" onclick="addLastMinutePlayer('${p.name}',${p.score});closeModal();"><span>${p.name}</span></div>`; });
    document.getElementById('add-modal').classList.remove('hidden');
  }

  function addLastMinutePlayer(n, s) { 
    let minTeam = 0;
    let minCount = Infinity;
    for(let i=0; i<teamCount; i++) {
      let count = document.getElementById(`team-list-${i}`).querySelectorAll('.drag-item').length;
      if(count < minCount) { minCount = count; minTeam = i; }
    }
    document.getElementById(`team-list-${minTeam}`).innerHTML += `<div class="drag-item" data-score="${s}">${n}<span style="cursor:pointer;" onclick="this.parentElement.remove();autoAnalyze();">✕</span></div>`; 
    autoAnalyze(); 
  }
  function addDraftGuestModal() { addLastMinutePlayer(`Guest ${document.querySelectorAll('.drag-item').length + 1}`, getGuestScore()); }
  function closeModal() { document.getElementById('add-modal').classList.add('hidden'); }
  (function initApp() {
    const lh = loadLocalHistory();
    if (lh.length) {
      hData = lh;
      renderHistory();
    }
    renderSavedMatches();
    fetchMasterData();
  })();
</script>
</body>
</html>
