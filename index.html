<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futsal Match Maker</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --primary-color: #1a237e;
      --accent-color: #00c853;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #212121;
      --text-sub: #757575;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0; padding: 20px;
      display: flex; justify-content: center;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      width: 100%; max-width: 450px;
      background: var(--card-bg);
      padding: 25px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    header { text-align: center; margin-bottom: 30px; position: relative; }
    h1 { font-size: 1.1rem; font-weight: 800; color: var(--primary-color); margin: 0; letter-spacing: -0.5px; }
    .icon-top { font-size: 24px; display: block; margin-bottom: 5px; }

    #admin-status { 
      position: absolute; right: 0; top: -10px;
      font-size: 10px; color: #ccc; cursor: pointer; padding: 10px;
    }

    .config-card {
      background: #f1f3f5; padding: 15px; border-radius: 12px;
      display: flex; gap: 15px; margin-bottom: 20px;
    }
    .config-item { flex: 1; }
    .config-item label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
    .config-item input { 
      width: 80%; border: none; background: transparent; 
      font-size: 16px; font-weight: 700; color: var(--primary-color);
      border-bottom: 2px solid #dee2e6; outline: none;
    }

    .list-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--text-sub); display: flex; justify-content: space-between; }
    
    .player-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .player-row input[type="text"] { 
      flex: 1; padding: 10px 15px; border: 1px solid #eee; border-radius: 10px; 
      background: #fff; transition: 0.2s; font-size: 14px;
    }
    .player-row input[type="text"]:focus { border-color: var(--accent-color); outline: none; }
    .p-score { width: 45px; padding: 8px; border-radius: 8px; border: 1px solid #eee; text-align: center; font-weight: bold; color: var(--accent-color); }

    button { 
      background: var(--primary-color); color: white; border: none; 
      padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; 
      width: 100%; transition: 0.3s; margin-top: 10px; font-family: inherit;
    }
    button:active { transform: scale(0.98); }
    .btn-save { background: var(--accent-color); margin-top: 20px; }

    .team-card { 
      background: #fff; border: 1px solid #f1f3f5; border-radius: 15px; 
      padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .team-name { font-weight: 800; color: var(--primary-color); font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .team-members { font-size: 14px; color: #444; font-weight: 500; }

    .history-card { 
      background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px;
      border: 1px solid #eee; font-size: 12px;
    }
    .rank-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; color: #fff; }
    .r1 { background: #ffd700; color: #000; }
    .r2 { background: #c0c0c0; color: #000; }
    .r3 { background: #cd7f32; color: #fff; }

    .hidden { display: none !important; }
    .admin-mode-on { color: var(--accent-color) !important; font-weight: bold; }
  </style>
</head>
<body>
