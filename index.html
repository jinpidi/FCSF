<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futsal Manager Pro v12.FINAL</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Futsal Manager Pro · FC 서울숲">
  <meta property="og:description" content="게임 플랜·매치 기록·라이브 스코어 — 링크를 눌러 바로 열기">
  <meta property="og:image" content="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?auto=format&amp;w=1200&amp;h=630&amp;fit=crop&amp;q=80">

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    :root { --primary-color: #0f172a; --accent-color: #10b981; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 13px; }
    .container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 15px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    header { text-align: center; margin-bottom: 12px; }
    h1 { font-size: 1.3rem; font-weight: 900; color: var(--primary-color); margin: 0; letter-spacing: -1.2px; text-transform: uppercase; }
    .team-title-label { font-size: 13px; font-weight: 700; color: var(--accent-color); margin-top: 2px; display: block; }
    .section-title { font-size: 9px; font-weight: 800; margin: 12px 0 6px; color: var(--text-sub); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 3px; }
    
    #saved-matches-section { margin-bottom: 12px; }
    .saved-match-card {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 58%, #334155 100%);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 10px 34px 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-shadow: 0 10px 20px rgba(15,23,42,0.24);
      position: relative;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .saved-match-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 13px 24px rgba(15,23,42,0.3);
    }
    .date-badge { background: var(--accent-color); color: white; padding: 4px 10px; border-radius: 50px; font-weight: 900; font-size: 12px; margin-left: 0; box-shadow: 0 2px 4px rgba(16,185,129,0.2); white-space: nowrap; }
    .admin-del { color: #f87171; cursor: pointer; font-weight: 900; margin-left: 8px; padding: 0 4px; }
    .saved-match-row { flex: 1; display: flex; align-items: center; flex-wrap: nowrap; gap: 4px; min-width: 0; }
    .saved-match-start {
      flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 5px; cursor: pointer; line-height: 1.3;
      padding-left: 0;
    }
    .saved-tap-main {
      width: 100%; min-width: 0; display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    }
    .saved-tap-main .saved-md-text {
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.01em;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.28);
    }
    .saved-match-date-mini {
      margin-left: 2px;
      font-size: 10px;
      font-weight: 800;
      color: #e2e8f0;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(226,232,240,0.35);
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      line-height: 1.1;
    }
    .saved-tap-main .date-badge {
      flex-shrink: 0; font-size: 12px; padding: 4px 10px; font-weight: 900;
    }
    .saved-match-actions { flex-shrink: 0; display: flex; align-items: center; margin-left: 0; margin-top: 0; }
    .saved-copy-link-btn {
      width: auto; margin: 0; margin-top: 0; padding: 4px 9px; border-radius: 999px; font-size: 9px; font-weight: 900; line-height: 1.1;
      border: 1px solid #60a5fa; color: #dbeafe; background: rgba(59,130,246,0.2); cursor: pointer; white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }
    .saved-copy-link-btn:active:not(:disabled) { opacity: 0.88; transform: scale(0.97); }
    .saved-copy-link-btn:disabled { opacity: 0.45; cursor: not-allowed; border-color: rgba(96,165,250,0.35); color: rgba(219,234,254,0.65); }
    .saved-copy-link-btn.saved-link-copied { border-color: #34d399; color: #ecfdf5; background: rgba(16,185,129,0.35); }
    .saved-preview-sub { margin-top: 0; }
    .saved-match-card .admin-del {
      position: absolute;
      top: 6px;
      right: 8px;
      margin: 0;
      font-size: 12px;
      line-height: 1;
      color: rgba(255,255,255,0.78);
    }
    #plan-loading-note {
      margin: 8px 0 6px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }
    #result-page.plan-loading {
      position: relative;
    }
    #result-page.plan-loading:before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(241,245,249,0.38);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 2;
      pointer-events: none;
    }
    #result-page.plan-loading #plan-loading-note {
      position: relative;
      z-index: 3;
    }
    #result-page.plan-loading #vs-display-grid,
    #result-page.plan-loading .match-date-card,
    #result-page.plan-loading #shuffle-btn,
    #result-page.plan-loading .btn-save-plan,
    #result-page.plan-loading .btn-accent,
    #result-page.plan-loading .btn-outline {
      filter: blur(4px);
      opacity: 0.22;
      pointer-events: none;
      user-select: none;
    }
    #history-section {
      margin-top: 20px;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .loading-dots:after { content: ' .'; animation: dots 0.65s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--text-sub); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--text-sub), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--text-sub), 1em 0 0 var(--text-sub); } }
    #loading { min-height: 44px; }

    .simple-config-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid #dbe2ea;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.04);
    }
    .match-type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      flex: 1;
      background: #f1f5f9;
      border-radius: 9px;
      padding: 3px;
    }
    .type-btn {
      flex: 1;
      padding: 6px 0;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 800;
      font-size: 10px;
      color: #64748b;
      margin-top: 0;
    }
    .type-btn.active {
      border-color: #bfdbfe;
      background: #ffffff;
      color: #1d4ed8;
      box-shadow: 0 1px 3px rgba(59,130,246,0.16);
    }
    #att-count {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 800;
      color: #475569;
      background: #f8fafc;
      border: 1px solid #dbe2ea;
      border-radius: 999px;
      padding: 5px 8px;
      line-height: 1;
      min-width: 78px;
      text-align: center;
    }

    .vs-grid { display: flex; gap: 8px; align-items: stretch; margin-top: 5px; overflow-x: auto; padding-bottom: 5px; }
    .team-column { flex: 1; min-width: 165px; display: flex; flex-direction: column; gap: 8px; }
    .team-box { background: #f8fafc; border-radius: 14px; padding: 10px; border: 1px solid #e2e8f0; flex: 1; }
    .drag-list { min-height: 120px; background: rgba(255,255,255,0.5); border-radius: 10px; border: 1px dashed #cbd5e1; padding: 4px; }
    .drag-item { background: white; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; border: 1px solid #e2e8f0; font-weight: 700; font-size: 10.5px; display: flex; justify-content: space-between; align-items: center; }

    .tactical-card { background: #111827; color: #fff; padding: 10px; border-radius: 14px; text-align: center; }
    .ovr-val { font-size: 24px; font-weight: 900; color: var(--accent-color); line-height: 1; }
    .chart-mini-box { background: rgba(255,255,255,0.03); border-radius: 10px; position: relative; margin-top: 3px; }
    .stat-bars-box { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 6px 6px 5px; margin-top: 3px; }
    .stat-bars-inner { text-align: left; }
    .stat-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 9px; }
    .stat-bar-row:last-child { margin-bottom: 0; }
    .stat-bar-lbl { width: 30px; flex-shrink: 0; font-weight: 800; color: #94a3b8; letter-spacing: -0.02em; }
    .stat-bar-track { flex: 1; height: 11px; background: rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
    .stat-bar-fill { height: 100%; border-radius: 5px; min-width: 3px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.15); }
    .tactical-pitch-wrap { margin-top: 4px; text-align: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 5px; display: flex; flex-direction: column; align-items: center; width: 100%; }
    .tp-tagline { font-size: 8.5px; font-weight: 800; color: #e9d5ff; letter-spacing: -0.02em; line-height: 1.45; margin-bottom: 6px; max-width: 100%; padding: 0 4px; }
    .tp-formation-title { font-size: 9px; font-weight: 900; color: #a5b4fc; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; margin-top: 0; text-align: center; line-height: 1.35; }
    .tp-field { position: relative; width: 100%; max-width: 228px; margin-left: auto; margin-right: auto; aspect-ratio: 5/7; border-radius: 12px; background: linear-gradient(180deg, #14532d 0%, #166534 45%, #15803d 100%); border: 2px solid rgba(255,255,255,0.2); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25); overflow: hidden; }
    .tp-field:before { content: ''; position: absolute; left: 50%; top: 50%; width: 32%; padding-bottom: 32%; border: 1px solid rgba(255,255,255,0.22); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    .tp-node { position: absolute; min-width: 0; max-width: 88%; display: flex; flex-direction: column; align-items: center; gap: 2px; z-index: 1; transform: translate(-50%, -50%); }
    .tp-pos { font-size: 7px; font-weight: 900; color: rgba(255,255,255,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.5); letter-spacing: 0.02em; }
    .tp-name { font-size: 9px; font-weight: 800; color: #fff; background: rgba(15,23,42,0.82); padding: 3px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); line-height: 1.2; max-width: 100%; text-align: center; word-break: keep-all; }
    .tp-sub { font-size: 7px; font-weight: 800; color: #fde68a; margin-top: 3px; text-align: center; max-width: 100%; word-break: keep-all; line-height: 1.25; opacity: 0.95; }
    .tp-empty { font-size: 9px; font-weight: 700; color: #64748b; text-align: center; padding: 10px 4px 4px; }

    .match-card { background: #f8fafc; border-radius: 14px; padding: 8px 12px; margin-bottom: 6px; border: 1px solid #e2e8f0; display: flex; flex-direction: row !important; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
    .round-info { font-size: 10px; font-weight: 900; color: var(--accent-color); min-width: 35px; white-space: nowrap; }
    .vs-area { display: flex; flex-direction: row !important; align-items: center; flex: 1; gap: 10px; justify-content: center; }
    .team-label { font-weight: 900; font-size: 11px; min-width: 25px; text-align: center; }
    .score-btns { display: flex; flex-direction: row !important; gap: 4px; flex: 1; max-width: 170px; }
    .s-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .s-btn.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    button { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 13px; margin-top: 6px; }
    .btn-accent { background: var(--accent-color); height: 50px; font-size: 15px; }
    .btn-save-plan { background: var(--primary-color); border: 2px solid var(--primary-color); color: white; font-weight: 900; }
    .btn-outline { background: transparent; color: var(--text-sub); border: 1px solid #e2e8f0; }

    .attendance-list { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px; max-height: 250px; overflow-y: auto; }
    #attendance-list { touch-action: pan-y; -webkit-overflow-scrolling: touch; }
    #attendance-list .player-card { touch-action: pan-y; }
    .player-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 5px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; font-size: 11px; -webkit-user-select: none; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; font-weight: 800; }
    .hidden { display: none !important; }

    .match-date-card { background: #fff; border: 2px solid var(--accent-color); padding: 12px 14px; border-radius: 16px; margin-top: 12px; box-shadow: 0 4px 12px rgba(16,185,129,0.1); display: flex; flex-direction: column; align-items: stretch; gap: 8px; width: 100%; }
    .match-date-label { font-size: 10px; font-weight: 900; color: var(--accent-color); letter-spacing: 0.06em; text-transform: uppercase; }
    .match-date-row { display: flex; align-items: center; justify-content: stretch; width: 100%; min-height: 44px; padding: 6px 10px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    .match-date-input { width: 100%; min-width: 0; border: none; background: transparent; font-family: inherit; font-weight: 800; color: var(--primary-color); font-size: 15px; cursor: pointer; text-align: left; line-height: 1.2; }
    .leaderboard-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #eee; }
    .leaderboard-table th { background: #f8fafc; padding: 10px; text-align: left; color: var(--text-sub); font-size: 9px; }
    .leaderboard-table td { padding: 10px; border-bottom: 1px solid #f8fafc; }
    .prob-badge { background: #ecfdf5; color: #059669; padding: 2px 6px; border-radius: 6px; font-weight: 800; font-size: 10px; }

    @media (max-width: 640px) {
      body { padding: 8px; font-size: 12px; }
      .container { border-radius: 18px; padding: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      .saved-match-card { padding: 9px 28px 9px 10px; border-radius: 13px; }
      .saved-tap-main .saved-md-text { font-size: 13px; }
      .saved-match-date-mini { font-size: 9px; padding: 2px 7px; }
      .saved-copy-link-btn { font-size: 8.5px; padding: 4px 8px; }
      .attendance-list { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
      .player-card { min-height: 36px; font-size: 9px; padding: 6px 3px; }
      .btn-accent { height: 46px; font-size: 14px; }
      .leaderboard-table { font-size: 10px; }
      .leaderboard-table th, .leaderboard-table td { padding: 8px 6px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="setup-page">
    <header><h1>Futsal Manager Pro</h1><span id="display-team-name" class="team-title-label"></span></header>
    <div id="sheet-sync-note" class="hidden" style="font-size:11px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 10px;margin:8px 0 0;text-align:center;font-weight:600;line-height:1.35;"></div>
    
    <div id="saved-matches-section" class="hidden">
        <div class="section-title">This Week Match Preview</div>
        <div id="saved-list"></div>
    </div>

    <div class="section-title">Quick Settings</div>
    <div class="simple-config-bar">
      <div class="match-type-selector">
        <button id="btn-2team" class="type-btn active" onclick="setTeamCount(2)">2-TEAMS</button>
        <button id="btn-3team" class="type-btn" onclick="setTeamCount(3)">3-TEAMS</button>
      </div>
      <div id="att-count">0 Selected</div>
    </div>

    <div class="section-title">Attendance Checklist</div>
    <div id="loading" style="text-align: center; padding: 12px 10px; color: var(--text-sub); font-weight: 600;">
      Loading<span class="loading-dots"></span>
    </div>
    <div class="attendance-list" id="attendance-list"></div>
    <div id="guest-draft-area" style="margin-top:8px; display:flex; gap:4px; flex-wrap: wrap;"></div>
    <button class="btn-outline" onclick="addDraftGuest()">+ Add Guest Player</button>
    <button class="btn-accent" onclick="makeTeams()">Draft Teams ⚡</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color:var(--accent-color);">Match Briefing</h1></header>
    <div id="plan-loading-note" class="hidden">Preparing lineup metrics<span class="loading-dots"></span></div>
    <div id="vs-display-grid" class="vs-grid"></div>
    <div class="match-date-card">
      <div class="match-date-label">Match date</div>
      <div class="match-date-row">
        <input type="date" id="match-date-input" class="match-date-input">
      </div>
    </div>
    
    <button id="shuffle-btn" class="btn-outline" style="margin-top: 12px; border-color: var(--accent-color); color: var(--accent-color);" onclick="reshuffle()">Reshuffle Squads</button>
    <button class="btn-outline" onclick="openAddPlayerModal()">+ Add Last-minute Player</button>
    <button class="btn-save-plan" onclick="saveMatchToHistory('exit')">Save Game Plan 💾</button>
    <button class="btn-accent" onclick="saveMatchToHistory('dashboard')">Start Game Now ⚽</button>
    <button class="btn-outline" style="border:none;" onclick="goBack('setup')">← Back to Setup</button>
  </div>

  <div id="match-page" class="hidden">
    <header><h1>Live Dashboard</h1></header>
    <div id="live-ranking" style="background:var(--primary-color); color:white; padding:10px; border-radius:14px; margin-bottom:12px; font-size:11px; text-align:center; font-weight:700;"></div>
    <div id="round-list"></div>
    <button class="btn-accent" onclick="finishMatch()">Complete & Archive 🏁</button>
    <button class="btn-outline" onclick="goBack('result')">← Back to Game Plan</button>
  </div>

  <div id="add-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 20px;">
    <div style="background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px;">
      <div class="section-title">Last-minute Entry</div>
      <div id="modal-player-list" class="attendance-list" style="margin-bottom:12px; grid-template-columns: repeat(4, minmax(0, 1fr));"></div>
      <button class="btn-outline" onclick="addDraftGuestModal()">+ Add New Guest</button>
      <button class="btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div id="history-section">
    <div class="section-title">Monthly Game Records</div>
    <div id="history-month-nav" style="display:none;justify-content:space-between;align-items:center;gap:10px;margin:4px 0 10px;"></div>
    <div id="history-list"></div>
    <div class="section-title">Player Power Rankings</div>
    <div id="leaderboard-area"></div>
  </div>
</div>

<script>
  const TEAM_NAME = "FC 서울숲";
  const ADMIN_PW = "1110023";
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbycVee58gGb-Lw8-2QWyzP-sBE64LaJ8wJqepkFnM8Ctjr0QDAQ6-0WTlJiE3KMhPpy/exec"; 
  const SHARE_BRIDGE_URL = "";
  const LOCAL_HISTORY_KEY = 'futsal_manager_local_history_v1';

  let shortShareCache = { key: '', url: '' };
  var linkButtonFallbackTimer = null;

  // --- [카카오톡 바로가기 활성화 및 단축 URL 복사 로직 수정 부분] ---
  function copyTextToClipboardSync(text, okMsg, quiet) {
    if (!text) { alert('복사할 링크가 없습니다.'); return false; }
    
    // 카카오톡은 URL 끝에 공백이 있으면 미리보기를 못 띄우는 경우가 많아 trim 처리
    const cleanUrl = text.trim();
    
    try {
      // 최신 API 시도
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(cleanUrl).then(() => {
          if (quiet) showLinkCopiedFeedback();
          else alert(okMsg || '링크가 복사되었습니다.');
        });
        return true;
      }
      
      // 구형 방식 호환 (textarea 생성)
      const ta = document.createElement('textarea');
      ta.value = cleanUrl;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) {
        if (quiet) showLinkCopiedFeedback();
        else alert(okMsg || '링크가 복사되었습니다.');
        return true;
      }
    } catch (e) {
      console.error('Clipboard error:', e);
    }
    
    window.prompt('아래 링크를 길게 눌러 복사해 주세요.', cleanUrl);
    return false;
  }

  async function buildShortShareUrl(m) {
    const sp = sharePayloadFromMatch(m);
    if (!sp || !sp.data) return '';
    try {
      const u = new URL(location.href);
      ['gp', 'p', 'plan'].forEach(function(k) { u.searchParams.delete(k); });
      u.hash = '';
      const appUrl = u.toString();
      
      // 카카오톡 바로가기를 위한 OG 정보를 API에 명확히 전달하도록 보완
      const fetchTask = fetch(SHEET_API_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'CREATE_SHARE',
          payload: sp.data,
          tag: sp.tag || 'p',
          appUrl: appUrl,
          bridgeUrl: SHARE_BRIDGE_URL,
          title: 'FC 서울숲 | 이번주 라인업 미리보기',
          desc: (m.dateIso || '') + ' 경기 플랜이 업데이트되었습니다.'
        })
      });
      const r = await fetchTask;
      if (!r || !r.ok) return '';
      const text = (await r.text()).replace(/^\uFEFF/, '').trim();
      const out = JSON.parse(text);
      if (out && out.ok && out.shortUrl) {
        return String(out.shortUrl);
      }
    } catch (e) {
      console.error('Shorten fail:', e);
    }
    return '';
  }

  function copyGamePlanShareFromSaved() {
    const mStr = localStorage.getItem('saved_manager_match');
    if (!mStr) return;
    var btn = document.getElementById('saved-copy-link-btn');
    if (btn && btn.dataset.linkRetry === '1') {
      setSavedLinkButtonState('loading');
      prewarmShortShareUrl();
      return;
    }
    if (btn && btn.disabled) return;
    let m;
    try { m = JSON.parse(mStr); } catch (e) { return; }
    
    const payloadKey = sharePayloadKeyFromMatch(m);
    // 캐시된 URL이 있으면 바로 복사
    if (payloadKey && shortShareCache.key === payloadKey && shortShareCache.url) {
      copyTextToClipboardSync(shortShareCache.url, '복사 완료! 카톡에 붙여넣으세요.', true);
      return;
    }
    
    alert('단축 링크가 생성되지 않았습니다. Retry를 누르거나 잠시 후 시도해 주세요.');
  }
  // --- [수정 부분 끝] ---

  function sharePayloadKeyFromMatch(m) {
    const sp = sharePayloadFromMatch(m);
    return sp && sp.data ? String(sp.data) : '';
  }

  function setSavedLinkButtonState(mode) {
    var btn = document.getElementById('saved-copy-link-btn');
    if (!btn) return;
    delete btn.dataset.linkRetry;
    if (mode === 'loading') {
      btn.disabled = true;
      btn.textContent = '…';
    } else if (mode === 'ready') {
      btn.disabled = false;
      btn.textContent = 'Link';
    } else if (mode === 'retry') {
      btn.disabled = false;
      btn.textContent = 'Retry';
      btn.dataset.linkRetry = '1';
    }
  }

  function showLinkCopiedFeedback() {
    var btn = document.getElementById('saved-copy-link-btn');
    if (!btn) return;
    var orig = btn.textContent;
    btn.textContent = 'Copied ✓';
    btn.classList.add('saved-link-copied');
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('saved-link-copied');
    }, 1400);
  }

  function prewarmShortShareUrl() {
    const mStr = localStorage.getItem('saved_manager_match');
    if (!mStr) {
      if (linkButtonFallbackTimer) clearTimeout(linkButtonFallbackTimer);
      shortShareCache.key = '';
      shortShareCache.url = '';
      return;
    }
    let m;
    try { m = JSON.parse(mStr); } catch (e) {
      setSavedLinkButtonState('retry');
      return;
    }
    const k = sharePayloadKeyFromMatch(m);
    if (!k) {
      setSavedLinkButtonState('retry');
      return;
    }
    if (shortShareCache.key === k && shortShareCache.url) {
      setSavedLinkButtonState('ready');
      return;
    }
    setSavedLinkButtonState('loading');
    if (linkButtonFallbackTimer) clearTimeout(linkButtonFallbackTimer);
    linkButtonFallbackTimer = setTimeout(function() {
      setSavedLinkButtonState('retry');
    }, 28000);
    function finishShortUrl(url) {
      if (linkButtonFallbackTimer) clearTimeout(linkButtonFallbackTimer);
      if (url && String(url).length) {
        shortShareCache.key = k;
        shortShareCache.url = url;
        setSavedLinkButtonState('ready');
      } else {
        setSavedLinkButtonState('retry');
      }
    }
    buildShortShareUrl(m).then(function(url) {
      if (url) {
        finishShortUrl(url);
        return;
      }
      return buildShortShareUrl(m);
    }).then(function(url2) {
      if (url2 && typeof url2 === 'string' && url2.length) {
        finishShortUrl(url2);
      } else if (url2 === undefined) {
        return;
      } else {
        finishShortUrl('');
      }
    }).catch(function() {
      if (linkButtonFallbackTimer) clearTimeout(linkButtonFallbackTimer);
      setSavedLinkButtonState('retry');
    });
  }

  function sharePayloadFromMatch(m) {
    try {
      const json = JSON.stringify(m);
      if (typeof LZString !== 'undefined' && LZString.compressToEncodedURIComponent) {
        const lz = LZString.compressToEncodedURIComponent(json);
        if (lz) return { tag: 'p', data: lz };
      }
    } catch (e) {}
    try {
      return { tag: 'gp', data: btoa(unescape(encodeURIComponent(JSON.stringify(m)))) };
    } catch (e) { return null; }
  }

  function matchFromSharePayload(raw, tagHint) {
    let decoded = raw;
    try { decoded = decodeURIComponent(String(raw).replace(/ /g, '+')); } catch (e) {}
    const tryLz = function() {
      if (typeof LZString === 'undefined' || !LZString.decompressFromEncodedURIComponent) return null;
      try {
        const json = LZString.decompressFromEncodedURIComponent(decoded);
        if (!json) return null;
        const m = JSON.parse(json);
        if (m && typeof m === 'object' && Array.isArray(m.teams)) return m;
      } catch (e) {}
      return null;
    };
    const tryB64 = function() {
      try {
        const json = decodeURIComponent(escape(atob(decoded)));
        const m = JSON.parse(json);
        if (m && typeof m === 'object' && Array.isArray(m.teams)) return m;
      } catch (e) {}
      return null;
    };
    if (tagHint === 'p') return tryLz() || tryB64();
    return tryB64() || tryLz();
  }

  function syncUrlWithGamePlan(m) {
    const sp = sharePayloadFromMatch(m);
    if (!sp || !sp.data) return;
    try {
      const u = new URL(location.href);
      ['gp', 'p', 'plan'].forEach(function(k) { u.searchParams.delete(k); });
      u.searchParams.set('plan', sp.data);
      u.hash = '';
      history.replaceState(null, '', u.toString());
    } catch (e) {}
  }

  function importGamePlanFromUrlIfPresent() {
    let tagHint = 'gp';
    let payload = '';
    try {
      const h = location.hash.slice(1);
      if (h.startsWith('p=')) { tagHint = 'p'; payload = h.slice(2); }
      else if (h.startsWith('gp=')) { tagHint = 'gp'; payload = h.slice(3); }
      if (!payload) {
        const u = new URL(location.href);
        if (u.searchParams.get('p')) { tagHint = 'p'; payload = u.searchParams.get('p'); }
        else if (u.searchParams.get('gp')) { tagHint = 'gp'; payload = u.searchParams.get('gp'); }
        else if (u.searchParams.get('plan')) { tagHint = 'gp'; payload = u.searchParams.get('plan'); }
      }
    } catch (e) {}
    if (!payload) return;
    const m = matchFromSharePayload(payload, tagHint);
    if (!m) return;
    deepLinkedGamePlan = m;
    try { localStorage.setItem('saved_manager_match', JSON.stringify(m)); } catch (e) {}
    try {
      const u = new URL(location.href);
      u.searchParams.delete('gp');
      u.searchParams.delete('p');
      u.searchParams.delete('plan');
      u.hash = '';
      history.replaceState(null, '', u.pathname + u.search);
    } catch (e2) {}
  }

  function openDeepLinkedGamePlanIfAny() {
    if (!deepLinkedGamePlan) return;
    activeMatch = deepLinkedGamePlan;
    deepLinkNeedsReanalyze = true;
    togglePlanLoading(true);
    const iso = activeMatch.dateIso || '';
    if (iso) document.getElementById('match-date-input').value = iso;
    renderVSMode((activeMatch.teams || []).map(function(t) {
      return { members: membersToPlayerList(t.members) };
    }));
    setTimeout(function() {
      if (deepLinkNeedsReanalyze) togglePlanLoading(true);
    }, 0);
    document.getElementById('shuffle-btn').classList.add('hidden');
    deepLinkedGamePlan = null;
  }

  function togglePlanLoading(show) {
    const el = document.getElementById('plan-loading-note');
    const page = document.getElementById('result-page');
    if (!el) return;
    if (show) {
      planLoadingShownAt = Date.now();
      el.classList.remove('hidden');
      if (page) page.classList.add('plan-loading');
    } else {
      const elapsed = Date.now() - planLoadingShownAt;
      const minVisibleMs = 260;
      if (elapsed < minVisibleMs) {
        setTimeout(function() {
          if (!deepLinkNeedsReanalyze) {
            el.classList.add('hidden');
            if (page) page.classList.remove('plan-loading');
          }
        }, minVisibleMs - elapsed);
      } else {
        el.classList.add('hidden');
        if (page) page.classList.remove('plan-loading');
      }
    }
  }

  let masterPlayers = [], teamCount = 2, hData = [], activeMatch = null, charts = [], draftGuests = [], currentDraftSelection = [];
  let deepLinkedGamePlan = null;
  let deepLinkNeedsReanalyze = false;
  let planLoadingShownAt = 0;
  let recordDedupeKey = '';
  let recordDedupeTs = 0;
  let historyMonthIndex = 0;

  // 초기화 부분 (실행 로직)
  window.onload = function() {
    const todayStr = new Date().toISOString().substring(0, 10);
    const dateInput = document.getElementById('match-date-input');
    if (dateInput) dateInput.value = todayStr;
    
    // ... 초기화 및 데이터 로딩 로직들 ...
    // (이후 원본의 나머지 모든 함수 및 이벤트 핸들러 유지)
    importGamePlanFromUrlIfPresent();
    prewarmShortShareUrl();
  };
</script>
