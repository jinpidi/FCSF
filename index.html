<style>
  /* 별점 그래픽 스타일 복구 및 강화 */
  .stars-wrap { display: flex; gap: 3px; }
  .star-icon { 
    width: 16px; height: 16px; position: relative; display: inline-block; 
    background-color: #e2e8f0; 
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); 
  }
  .star-icon.full { background-color: var(--star-color); }
  .star-icon.half::before { 
    content: ''; position: absolute; left: 0; top: 0; width: 50%; height: 100%; 
    background-color: var(--star-color); 
  }
</style>

<script>
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyuMHd-fAC1m-E_6exvPwKunMqFBvGTuCIxFT3A1RqW-Z0nsDYr_0kgFSP0495hC6OF/exec";
  
  let masterPlayers = [];
  let guests = [];
  let teamCount = 2;

  // ... 인원 조절 및 데이터 페칭 함수 동일 ...

  // [수정] 정밀한 별점 렌더링 함수 (반 별 지원)
  function renderStars(score) {
    const starVal = score / 20; // 100점 만점 기준 5점 척도
    let html = '<div class="stars-wrap">';
    for (let i = 1; i <= 5; i++) {
      if (i <= Math.floor(starVal)) {
        html += '<span class="star-icon full"></span>';
      } else if (i - 0.5 <= starVal) {
        html += '<span class="star-icon half"></span>';
      } else {
        html += '<span class="star-icon"></span>';
      }
    }
    return html + '</div>';
  }

  function makeTeams() {
    let players = []; let total = 0;
    const selected = document.querySelectorAll('.p-check:checked');
    selected.forEach(cb => { 
      const s = parseInt(cb.dataset.score); 
      players.push({ n: cb.dataset.name, s: s }); 
      total += s; 
    });
    const avg = selected.length > 0 ? total / selected.length : 50;
    guests.forEach(g => players.push({ n: g, s: avg }));
    
    if(players.length < teamCount) return alert("팀 수보다 인원이 적습니다.");

    // [수정] 변별력을 위한 랜덤 가중치 범위 소폭 확대
    players = players.map(p => ({ ...p, w: p.s + (Math.random() * 30 - 15) }));
    players.sort((a,b) => b.w - a.w);
    
    let teams = Array.from({length: teamCount}, () => ({ members: [], total: 0 }));
    let idx = 0, dir = 1;
    players.forEach(p => { 
      teams[idx].members.push(p.n); 
      teams[idx].total += p.s; 
      idx += dir; 
      if(idx === teamCount || idx === -1) { dir *= -1; idx += dir; } 
    });

    renderResults(teams.sort(() => Math.random() - 0.5));
  }

  function renderResults(teams) {
    const box = document.getElementById('team-results'); box.innerHTML = '';
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    
    teams.forEach((t, i) => {
      const avg = t.total / t.members.length;
      const card = document.createElement('div'); card.className = 'team-card';
      // [수정] 정밀 별점 함수 호출
      card.innerHTML = `
        <div class="team-header">
          <span style="font-weight:800;">🚩 Team ${i+1}</span>
          ${renderStars(avg)}
        </div>
        <div style="font-size:15px; font-weight:600; line-height:1.5;">${t.members.sort().join(', ')}</div>
      `;
      box.appendChild(card);
    });
  }

  // ... 나머지 함수 동일 ...
</script>
