<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futsal Match Maker (Live)</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --primary-color: #0f172a; --accent-color: #10b981; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --star-color: #fbbf24; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; font-size: 14px; }
    .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    header { text-align: center; margin-bottom: 25px; position: relative; }
    h1 { font-size: 1.3rem; font-weight: 800; color: var(--primary-color); margin: 0; letter-spacing: -1px; }
    .section-title { font-size: 12px; font-weight: 700; margin-bottom: 12px; color: var(--text-sub); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center;}
    .attendance-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
    .player-card { background: #f8fafc; border: 2px solid #f1f5f9; padding: 14px 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; }
    .player-card input { pointer-events: none; transform: scale(1.2); accent-color: var(--accent-color); }
    .config-card { background: #f8fafc; padding: 15px; border-radius: 16px; display: flex; gap: 15px; margin-bottom: 20px; }
    .config-item { flex: 1; }
    .config-item label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
    .config-item input { width: 100%; border: none; background: transparent; font-size: 18px; font-weight: 800; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; outline: none; }
    button { background: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; }
    .btn-guest { background: #64748b; margin-top: 5px; padding: 10px; font-size: 12px; }
    .team-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px; margin-bottom: 12px; }
    .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .stars-wrap { display: flex; gap: 2px; }
    .star-icon { width: 14px; height: 14px; position: relative; display: inline-block; background-color: #e2e8f0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
    .star-icon.full { background-color: var(--star-color); }
    .star-icon.half::before { content: ''; position: absolute; left: 0; top: 0; width: 50%; height: 100%; background-color: var(--star-color); }
    .loading-msg { text-align: center; padding: 40px; color: var(--text-sub); font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <header><h1>Futsal Match Maker</h1></header>

  <div id="setup-page">
    <div class="config-card">
      <div class="config-item"><label>Ready to Play</label><div id="att-count" style="font-size: 18px; font-weight: 800;">0 Players</div></div>
      <div class="config-item"><label>Teams Count</label><input type="number" id="t-count" value="2" min="2"></div>
    </div>
    <div class="section-title">Attendance Checklist</div>
    <div id="loading" class="loading-msg">구글 시트에서 명단을 가져오는 중...</div>
    <div class="attendance-list" id="attendance-list"></div>
    <div id="guest-area" style="margin-bottom:15px;"></div>
    <button class="btn-guest" onclick="addGuest()">+ Add Guest Player</button>
    <button style="margin-top:25px; height:55px; font-size:15px; background: var(--accent-color);" onclick="makeTeams()">Generate Balanced Teams</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color: var(--accent-color);">Matching Result</h1></header>
    <div id="team-results"></div>
    <button style="background: #6366f1;" onclick="makeTeams()">Shuffle Mix ⚡</button>
    <button style="background: transparent; color: var(--text-sub); border: 1px solid #e2e8f0;" onclick="goBack()">Back to List</button>
  </div>
</div>

<script>
  // 
  const SHEET_API_URL = https://script.google.com/macros/s/AKfycbyQ6nY5N-NS4C30KkqF7gqfdwIOqEHcy-Kix6q7nYc_qGabN3Pdjz_5WDXc1dgVEfdA/exec;
  
  let masterPlayers = [];
  let guests = [];
  let currentTeams = [];

  // 구글 시트에서 실시간으로 데이터 가져오기
  async function fetchMasterData() {
    try {
      const response = await fetch(SHEET_API_URL);
      masterPlayers = await response.json();
      document.getElementById('loading').classList.add('hidden');
      renderAttendanceList();
    } catch (e) {
      document.getElementById('loading').innerText = "명단을 불러오지 못했습니다. URL 설정을 확인하세요.";
    }
  }

  function renderAttendanceList() {
    const box = document.getElementById('attendance-list');
    box.innerHTML = '';
    // 가나다 순 정렬
    masterPlayers.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
    
    masterPlayers.forEach(p => {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.onclick = () => {
        const cb = card.querySelector('.p-check');
        cb.checked = !cb.checked;
        card.classList.toggle('active', cb.checked);
        updateCount();
      };
      card.innerHTML = `<input type="checkbox" class="p-check" data-name="${p.name}" data-score="${p.score}"><span>${p.name}</span>`;
      box.appendChild(card);
    });
  }

  function addGuest() { guests.push(`Guest ${guests.length+1}`); renderGuests(); updateCount(); }
  function renderGuests() {
    document.getElementById('guest-area').innerHTML = guests.map((g, i) => `<div style="display:inline-block; background:#f1f5f9; padding:6px 12px; border-radius:10px; margin:4px; font-size:12px; font-weight:600;">${g} <span style="cursor:pointer; color:#ef4444; margin-left:5px;" onclick="removeGuest(${i})">✕</span></div>`).join('');
  }
  function removeGuest(i) { guests.splice(i, 1); renderGuests(); updateCount(); }
  function updateCount() { document.getElementById('att-count').innerText = (document.querySelectorAll('.p-check:checked').length + guests.length) + " Players"; }

  function renderStars(score) {
    const starVal = score / 20;
    let html = '<div class="stars-wrap">';
    for (let i = 1; i <= 5; i++) {
      if (i <= Math.floor(starVal)) html += '<span class="star-icon full"></span>';
      else if (i - 0.5 <= starVal) html += '<span class="star-icon half"></span>';
      else html += '<span class="star-icon"></span>';
    }
    return html + '</div>';
  }

  function makeTeams() {
    let players = []; let total = 0;
    const selected = document.querySelectorAll('.p-check:checked');
    selected.forEach(cb => { 
      const s = parseInt(cb.dataset.score); 
      players.push({ n: cb.dataset.name, s: s }); 
      total += s; 
    });
    const avg = selected.length > 0 ? total / selected.length : 50;
    guests.forEach(g => players.push({ n: g, s: avg }));
    const tCount = parseInt(document.getElementById('t-count').value);
    
    players = players.map(p => ({ ...p, w: p.s + (Math.random() * 30 - 15) }));
    players.sort((a,b) => b.w - a.w);
    let teams = Array.from({length: tCount}, () => ({ members: [], total: 0 }));
    let idx = 0, dir = 1;
    players.forEach(p => { 
      teams[idx].members.push(p.n); 
      teams[idx].total += p.s; 
      idx += dir; 
      if(idx === tCount || idx === -1) { dir *= -1; idx += dir; } 
    });
    currentTeams = teams.sort(() => Math.random() - 0.5);
    renderResults();
  }

  function renderResults() {
    const box = document.getElementById('team-results'); box.innerHTML = '';
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    currentTeams.forEach((t, i) => {
      const avg = t.total / t.members.length;
      const card = document.createElement('div'); card.className = 'team-card';
      card.innerHTML = `<div class="team-header"><span class="team-name">🚩 Team ${i+1}</span>${renderStars(avg)}</div><div style="font-size:15px; font-weight:600;">${t.members.sort().join(', ')}</div>`;
      box.appendChild(card);
    });
  }

  function goBack() { document.getElementById('setup-page').classList.remove('hidden'); document.getElementById('result-page').classList.add('hidden'); }
  
  // 페이지 로드 시 데이터 가져오기 실행
  window.onload = fetchMasterData;
</script>
</body>
</html>
