<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FC 서울숲 | 이번주 라인업 미리보기</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="FC 서울숲 | 이번주 라인업 미리보기">
  <meta property="og:description" content="이번 주 라인업과 매치업 포인트를 먼저 확인하세요">
  <meta property="og:image" content="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?auto=format&fit=crop&w=1200&h=630&q=80">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: grid; place-items: center; min-height: 100vh; }
    .msg { font-weight: 700; letter-spacing: 0.01em; }
  </style>
</head>
<body>
  <div class="msg">FC 서울숲 라인업 페이지로 이동 중...</div>
  <script>
    var SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbycVee58gGb-Lw8-2QWyzP-sBE64LaJ8wJqepkFnM8Ctjr0QDAQ6-0WTlJiE3KMhPpy/exec";
    var sid = new URLSearchParams(location.search).get("sid");
    if (!sid) {
      document.querySelector(".msg").textContent = "공유 코드가 없습니다.";
    } else {
      fetch(SCRIPT_API_URL + "?resolve=1&s=" + encodeURIComponent(sid), { cache: "no-store" })
        .then(function(r) { return r.json(); })
        .then(function(out) {
          if (!out || !out.ok || !out.data || !out.data.appUrl || !out.data.payload) throw new Error("not found");
          var base = String(out.data.appUrl);
          var sep = base.indexOf("?") >= 0 ? "&" : "?";
          location.replace(base + sep + "plan=" + encodeURIComponent(out.data.payload));
        })
        .catch(function() {
          document.querySelector(".msg").textContent = "링크를 열 수 없습니다. Link 버튼에서 다시 복사해 주세요.";
        });
    }
  </script>
</body>
</html>
