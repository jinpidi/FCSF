<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futsal Match Maker</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { 
      --primary-color: #0f172a; 
      --accent-color: #10b981; 
      --bg-color: #f1f5f9; 
      --card-bg: #ffffff; 
      --text-main: #1e293b; 
      --text-sub: #64748b; 
      --star-color: #fbbf24; 
    }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; font-size: 14px; line-height: 1.6; }
    .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    header { text-align: center; margin-bottom: 30px; position: relative; }
    h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); margin: 0; letter-spacing: -1px; }
    #admin-status { position: absolute; right: 0; top: -15px; font-size: 11px; color: #cbd5e1; cursor: pointer; padding: 10px; }
    .section-title { font-size: 12px; font-weight: 700; margin-bottom: 15px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
    .admin-box { background: #fff1f2; border: 1px solid #fecdd3; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
    .data-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .data-row input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; outline: none; }
    .attendance-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; max-height: 280px; overflow-y: auto; padding-right: 5px; }
    .player-card { background: #f8fafc; border: 2px solid transparent; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; }
    .player-card input { accent-color: var(--accent-color); transform: scale(1.2); pointer-events: none; }
    .config-card { background: #f8fafc; padding: 20px; border-radius: 16px; display: flex; gap: 20px; margin-bottom: 25px; }
    .config-item { flex: 1; }
    .config-item label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
    .config-item input { width: 100%; border: none; background: transparent; font-size: 20px; font-weight: 800; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; outline: none; }
    button { background: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-family: inherit; transition: 0.2s; }
    .btn-guest { background: #64748b; margin-top: 5px; font-size: 12px; padding: 12px; }
    .team-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px; margin-bottom: 15px; }
    .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .team-name { font-weight: 800; color: var(--primary-color); font-size: 14px; }
    .stars-wrap { display: flex; gap: 3px; }
    .star-icon { width: 16px; height: 16px; position: relative; display: inline-block; background-color: #e2e8f0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
    .star-icon.full { background-color: var(--star-color); }
    .star-icon.half::before { content: ''; position: absolute; left: 0; top: 0; width: 50%; height: 100%; background-color: var(--star-color); }
    .history-card { background: #ffffff; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; font-size: 13px; position: relative; }
    .rank-tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-right: 8px; color: #fff; background: #94a3b8; }
    .rank-1 { background: #fbbf24; color: #78350f; }
    .del-btn { position: absolute; right: 15px; top: 15px; color: #ef4444; cursor: pointer; font-size: 11px; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <span id="admin-status" onclick="handleAdmin()">Admin Access</span>
  <header><h1>Futsal Match Maker</h1></header>

  <div id="admin-page" class="hidden">
    <div class="section-title"><span>Player Database</span><button onclick="saveMasterData()" style="width:auto; padding:6px 16px; margin:0; font-size:11px;">Update All</button></div>
    <div class="admin-box" id="master-list"></div>
    <button onclick="addMasterRow()" style="background:#475569; font-size:11px; padding:10px;">+ Add New Entry</button>
  </div>

  <div id="setup-page">
    <div class="config-card">
      <div class="config-item"><label>Ready to Play</label><div class="val" id="att-count" style="font-size: 20px; font-weight: 800;">0 Players</div></div>
      <div class="config-item"><label>Teams Count</label><input type="number" id="t-count" value="2" min="2"></div>
    </div>
    <div class="section-title">Attendance Checklist</div>
    <div class="attendance-list" id="attendance-list"></div>
    <div class="section-title">Guest Players</div>
    <div id="guest-area" style="margin-bottom:15px;"></div>
    <button class="btn-guest" onclick="addGuest()">+ Add Guest Player</button>
    <button style="margin-top:30px; height:60px; font-size:16px; background: var(--accent-color);" onclick="makeTeams()">Generate Balanced Teams</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color: var(--accent-color);">Matching Result</h1></header>
    <div id="team-results"></div>
    <button style="background: var(--primary-color);" onclick="openRankModal()">Save Performance</button>
    <button style="background: #6366f1;" onclick="makeTeams()">Shuffle Mix ⚡</button>
    <button style="background: transparent; color: var(--text-sub); border: 1px solid #e2e8f0;" onclick="goBack()">Back to List</button>
  </div>

  <div class="history-section" style="margin-top: 45px;">
    <div class="section-title">Match History</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
  const _0x1="shj", _0x2="1110023", S_KEY=_0x1+_0x2;
  let isAdm = false;
  let masterData = JSON.parse(localStorage.getItem('f_master')) || {};
  let hData = JSON.parse(localStorage.getItem('f_history')) || [];
  let guests = [];
  let currentTeams = [];

  function handleAdmin() {
    if (isAdm) { isAdm = false; location.reload(); return; }
    const pw = prompt("Admin Password Required");
    if (pw && pw.trim() === S_KEY) {
      isAdm = true;
      document.getElementById('admin-status').innerText = "Exit Admin";
      document.getElementById('admin-page').classList.remove('hidden');
      renderMasterList(); renderHistory();
    } else if(pw) alert("Access Denied.");
  }

  function renderMasterList() {
    const box = document.getElementById('master-list');
    box.innerHTML = '';
    Object.keys(masterData).sort().forEach(name => addMasterRow(name, masterData[name]));
  }

  function addMasterRow(name = "", score = 50) {
    const row = document.createElement('div'); row.className = 'data-row';
    row.innerHTML = `<input type="text" class="m-name" value="${name}" style="flex:2"><input type="number" class="m-score" value="${score}" style="flex:1"><button onclick="this.parentElement.remove()" style="flex:0.3; background:#ef4444; padding:5px; margin:0; border-radius:8px;">✕</button>`;
    document.getElementById('master-list').appendChild(row);
  }

  function saveMasterData() {
    const newData = {};
    document.querySelectorAll('#master-list .data-row').forEach(row => {
      const n = row.querySelector('.m-name').value.trim();
      const s = parseInt(row.querySelector('.m-score').value) || 50;
      if(n) newData[n] = s;
    });
    masterData = newData; localStorage.setItem('f_master', JSON.stringify(masterData));
    alert("Database Updated."); renderAttendanceList();
  }

  function renderAttendanceList() {
    const box = document.getElementById('attendance-list'); box.innerHTML = '';
    Object.keys(masterData).sort().forEach(name => {
      const card = document.createElement('div'); card.className = 'player-card';
      card.onclick = () => { const cb = card.querySelector('.p-check'); cb.checked = !cb.checked; card.classList.toggle('active', cb.checked); updateCount(); };
      card.innerHTML = `<input type="checkbox" class="p-check" data-name="${name}" data-score="${masterData[name]}"><span>${name}</span>`;
      box.appendChild(card);
    });
    updateCount();
  }

  function addGuest() { guests.push(`Guest ${guests.length+1}`); renderGuests(); updateCount(); }
  function renderGuests() {
    document.getElementById('guest-area').innerHTML = guests.map((g, i) => `<div style="display:inline-block; background:#f1f5f9; padding:6px 12px; border-radius:10px; margin:4px; font-size:12px; font-weight:600;">${g} <span style="cursor:pointer; color:#ef4444; margin-left:5px;" onclick="removeGuest(${i})">✕</span></div>`).join('');
  }
  function removeGuest(i) { guests.splice(i, 1); renderGuests(); updateCount(); }
  function updateCount() { document.getElementById('att-count').innerText = (document.querySelectorAll('.p-check:checked').length + guests.length) + " Players"; }

  function renderStars(score) {
    const starVal = score / 20;
    let starsHtml = '<div class="stars-wrap">';
    for (let i = 1; i <= 5; i++) {
      if (i <= Math.floor(starVal)) starsHtml += '<span class="star-icon full"></span>';
      else if (i - 0.5 <= starVal) starsHtml += '<span class="star-icon half"></span>';
      else starsHtml += '<span class="star-icon"></span>';
    }
    return starsHtml + '</div>';
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  // 핵심 알고리즘: 최근 기록 기반 팀 섞기 방지
  function makeTeams() {
    let players = [];
    let total = 0;
    const selected = document.querySelectorAll('.p-check:checked');
    
    selected.forEach(cb => {
      const s = parseInt(cb.dataset.score);
      players.push({ n: cb.dataset.name, s: s, historyScore: 0 });
      total += s;
    });

    const avg = selected.length > 0 ? total / selected.length : 50;
    guests.forEach(g => players.push({ n: g, s: avg, historyScore: 0 }));

    const tCount = parseInt(document.getElementById('t-count').value);
    if(players.length < tCount) return alert("Select more players.");

    // 1. 최근 3개의 경기 데이터 분석
    const recentHistory = hData.slice(0, 3);
    
    // 2. 같은 팀이었던 횟수 점수화
    players.forEach(p1 => {
      players.forEach(p2 => {
        if (p1.n === p2.n) return;
        recentHistory.forEach(match => {
          match.rank.forEach(team => {
            if (team.names.includes(p1.n) && team.names.includes(p2.n)) {
              p1.historyScore += 10; // 같은 팀이었을 때 패널티 부여
            }
          });
        });
      });
    });

    // 3. 점수 + 히스토리 패널티 + 랜덤 가중치로 팀 배정 가중치 계산
    players = players.map(p => ({
      ...p,
      // 히스토리 점수가 높을수록(최근 같은 팀일수록) weight가 낮아지게 하여 
      // 지그재그 배정 시 다른 순번에 위치하게 유도
      weight: p.s + (Math.random() * 30 - 15) - (p.historyScore) 
    }));

    players.sort((a,b) => b.weight - a.weight);

    let teams = Array.from({length: tCount}, () => ({ members: [], total: 0 }));
    let idx = 0, dir = 1;

    players.forEach(p => {
      teams[idx].members.push(p.n);
      teams[idx].total += p.s;
      idx += dir;
      if(idx === tCount || idx === -1) {
        dir *= -1;
        idx += dir;
      }
    });

    currentTeams = shuffle(teams);
    renderResults();
  }

  function renderResults() {
    const box = document.getElementById('team-results'); box.innerHTML = '';
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    currentTeams.forEach((t, i) => {
      const avg = t.total / t.members.length;
      const card = document.createElement('div'); card.className = 'team-card';
      card.innerHTML = `<div class="team-header"><span class="team-name">🚩 Team ${i+1}</span>${renderStars(avg)}</div><div style="font-size:15px; font-weight:600; color:var(--text-main);">${t.members.sort().join(', ')}</div>`;
      box.appendChild(card);
    });
  }

  function openRankModal() {
    let rankResult = [];
    for(let i=1; i<=currentTeams.length; i++) {
      const teamNum = prompt(`${i}st Place Team Number? (1 ~ ${currentTeams.length})`);
      if(!teamNum) return;
      rankResult.push({ r: i, names: currentTeams[teamNum-1].members.join(', ') });
    }
    hData.unshift({ id: Date.now(), date: new Date().toLocaleDateString(), rank: rankResult });
    localStorage.setItem('f_history', JSON.stringify(hData));
    renderHistory(); alert("Performance Saved.");
  }

  function renderHistory() {
    const box = document.getElementById('history-list');
    box.innerHTML = hData.length === 0 ? "<div style='text-align:center; color:var(--text-sub); padding:30px; font-weight:600;'>No records yet.</div>" : "";
    hData.forEach(h => {
      const div = document.createElement('div'); div.className = 'history-card';
      let html = `<div style="font-weight:800; margin-bottom:10px; color:var(--primary-color);">📅 ${h.date}</div>`;
      if(isAdm) html += `<span class="del-btn" onclick="deleteHistory(${h.id})">Delete</span>`;
      h.rank.forEach(rk => html += `<div style="margin-bottom:6px;"><span class="rank-tag rank-${rk.r}">${rk.r}st</span> <span style="font-weight:600;">${rk.names}</span></div>`);
      div.innerHTML = html; box.appendChild(div);
    });
  }

  function deleteHistory(id) { if(confirm("Delete this record?")) { hData = hData.filter(h => h.id !== id); localStorage.setItem('f_history', JSON.stringify(hData)); renderHistory(); } }
  function goBack() { document.getElementById('setup-page').classList.remove('hidden'); document.getElementById('result-page').classList.add('hidden'); }
  window.onload = () => { renderAttendanceList(); renderHistory(); };
</script>
</body>
</html>
