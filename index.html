<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futsal Manager Pro v9.3</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary-color: #0f172a; --accent-color: #10b981; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 13px; }
    .container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 20px 15px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    header { text-align: center; margin-bottom: 15px; }
    h1 { font-size: 1.4rem; font-weight: 900; color: var(--primary-color); margin: 0; letter-spacing: -1.2px; text-transform: uppercase; }
    .team-title-label { font-size: 14px; font-weight: 700; color: var(--accent-color); margin-top: 4px; display: block; }
    
    /* [수정] 한 줄 심플 세팅 바 */
    .simple-config-bar { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 10px 15px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
    .match-type-selector { display: flex; gap: 5px; flex: 1; }
    .type-btn { flex: 1; padding: 10px 0; border: 1px solid #cbd5e1; background: white; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 11px; transition: 0.2s; color: var(--text-sub); }
    .type-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }
    #att-count { font-weight: 800; color: var(--accent-color); white-space: nowrap; font-size: 12px; }

    .section-title { font-size: 10px; font-weight: 800; margin: 15px 0 8px; color: var(--text-sub); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 4px; }
    
    /* [수정] 전략 회의 VS 레이아웃 정렬 보강 */
    .vs-grid { display: flex; gap: 12px; align-items: stretch; margin-top: 10px; overflow-x: auto; padding-bottom: 10px; }
    .team-column { flex: 1; min-width: 170px; display: flex; flex-direction: column; gap: 10px; }
    
    .team-box { background: #f8fafc; border-radius: 16px; padding: 12px; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column; }
    .drag-list { min-height: 150px; flex: 1; padding: 5px; background: rgba(255,255,255,0.5); border-radius: 10px; border: 1px dashed #cbd5e1; }
    .drag-item { background: white; padding: 8px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #e2e8f0; cursor: grab; font-weight: 700; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
    .drag-item .item-del { color: #f87171; font-weight: 900; padding: 0 5px; cursor: pointer; }

    /* [수정] 차트 크기 확대 및 카드 디자인 */
    .tactical-card { background: #111827; color: #fff; padding: 15px; border-radius: 18px; text-align: center; }
    .ovr-val { font-size: 28px; font-weight: 900; color: var(--accent-color); line-height: 1; }
    .ovr-lbl { font-size: 10px; opacity: 0.6; font-weight: 700; margin-bottom: 3px; }
    .chart-mini-box { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 5px; height: 180px; position: relative; }

    /* 대시보드 1줄 레이아웃 */
    .match-card { background: #f8fafc; border-radius: 16px; padding: 10px 15px; margin-bottom: 8px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .round-info { font-size: 10px; font-weight: 900; color: var(--accent-color); min-width: 45px; }
    .vs-area { display: flex; align-items: center; flex: 1; gap: 8px; justify-content: center; }
    .score-btns { display: flex; gap: 3px; flex: 1; max-width: 180px; }
    .s-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 10px; font-weight: 700; cursor: pointer; }
    .s-btn.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    button { background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; font-size: 13px; margin-top: 8px; }
    .btn-accent { background: var(--accent-color); height: 55px; font-size: 15px; }
    .btn-outline { background: transparent; color: var(--text-sub); border: 1px solid #e2e8f0; }

    .attendance-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 220px; overflow-y: auto; }
    .player-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; }
    
    .hidden { display: none !important; }
    .loading-msg { text-align: center; padding: 30px; color: var(--text-sub); font-weight: 600; font-size: 14px; }
    .dots::after { content: ''; display: inline-block; width: 12px; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
  </style>
</head>
<body>

<div class="container">
  <div id="setup-page">
    <header><h1>Futsal Manager Pro</h1><span id="display-team-name" class="team-title-label"></span></header>
    
    <div id="saved-matches-section" class="hidden"><div class="section-title">Ready to Deploy</div><div id="saved-list"></div></div>
    
    <div class="section-title">Quick Settings</div>
    <div class="simple-config-bar">
      <div class="match-type-selector">
        <button id="btn-2team" class="type-btn active" onclick="setTeamCount(2)">2-TEAMS</button>
        <button id="btn-3team" class="type-btn" onclick="setTeamCount(3)">3-TEAMS</button>
      </div>
      <div id="att-count">0 Players Selected</div>
    </div>

    <div class="section-title">Attendance Checklist</div>
    <div id="loading" class="loading-msg">
      <span class="dots">Loading Player List</span>
      <div id="load-timer" style="font-size: 11px; font-weight: 400; margin-top: 5px; opacity: 0.7;">Elapsed: 0s</div>
    </div>
    
    <div class="attendance-list" id="attendance-list"></div>
    <button class="btn-accent" onclick="makeTeams()">Draft Teams ⚡</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color:var(--accent-color);">Tactical Briefing</h1></header>
    <div id="vs-display-grid" class="vs-grid"></div>
    <button class="btn-outline" style="margin-top: 15px;" onclick="openAddPlayerModal()">+ Add Last-minute Player</button>
    <button class="btn-accent" onclick="saveMatchToHistory('dashboard')">Enter Dashboard ⚽</button>
    <button class="btn-outline" onclick="saveMatchToHistory('exit')">Save Tactics 💾</button>
    <button style="background:transparent; color:var(--text-sub); border:none; font-size:11px;" onclick="goBack()">Cancel</button>
  </div>

  <div id="match-page" class="hidden">
    <header><h1>Live Dashboard</h1></header>
    <div id="live-ranking" style="background:var(--primary-color); color:white; padding:12px; border-radius:18px; margin-bottom:15px; font-size:12px; text-align:center; font-weight:700;"></div>
    <div id="round-list"></div>
    <button class="btn-accent" onclick="finishMatch()">Complete & Archive 🏁</button>
    <button class="btn-outline" onclick="confirmReset()">Close</button>
  </div>

  <div id="add-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 20px;">
    <div style="background: #fff; width: 100%; max-width: 400px; border-radius: 24px; padding: 20px;">
      <div class="section-title">Last-minute entry</div>
      <div id="modal-player-list" class="attendance-list"></div>
      <button class="btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div id="history-section" style="margin-top: 30px;"><div class="section-title">Manager Records</div><div id="history-list"></div></div>
</div>

<script>
  const TEAM_NAME = "FC 서울숲";
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzo_9mYhtzTFQ6oFh9Xd-RaVf6degYYeEI9mCNrgyyaku4jnjNKVo7WIBaf2otYIVwB/exec"; 

  let masterPlayers = [], teamCount = 2, hData = [], activeMatch = null, charts = [];
  let loadStartTime = Date.now();

  document.getElementById('display-team-name').innerText = TEAM_NAME;

  // 로딩 타이머 가동
  const timerInt = setInterval(() => {
    if(document.getElementById('loading').classList.contains('hidden')) clearInterval(timerInt);
    document.getElementById('load-timer').innerText = `Elapsed: ${Math.floor((Date.now() - loadStartTime)/1000)}s`;
  }, 1000);

  async function fetchMasterData() {
    try {
      const response = await fetch(SHEET_API_URL);
      const result = await response.json();
      masterPlayers = result.players;
      hData = result.history || [];
      document.getElementById('loading').classList.add('hidden');
      renderAttendanceList();
      renderHistory();
      renderSavedMatches();
    } catch (e) { document.getElementById('loading').innerText = "Load failed."; }
  }

  function setTeamCount(val) {
    teamCount = val;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(val === 2) document.getElementById('btn-2team').classList.add('active');
    else document.getElementById('btn-3team').classList.add('active');
  }

  function renderAttendanceList() {
    const box = document.getElementById('attendance-list'); box.innerHTML = '';
    masterPlayers.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR')).forEach(p => {
      const card = document.createElement('div'); card.className = 'player-card';
      card.onclick = () => { card.classList.toggle('active'); updateCount(); };
      card.innerHTML = `<span class="p-name" data-score="${p.score}">${p.name}</span>`;
      box.appendChild(card);
    });
  }

  function updateCount() {
    const count = document.querySelectorAll('#attendance-list .player-card.active').length;
    document.getElementById('att-count').innerText = `${count} Players Selected`;
  }

  function makeTeams() {
    const selected = Array.from(document.querySelectorAll('#attendance-list .player-card.active')).map(el => {
      const span = el.querySelector('.p-name');
      return { n: span.innerText, s: parseFloat(span.dataset.score) };
    });
    if(selected.length < teamCount) return alert("인원이 부족합니다.");
    selected.sort((a,b) => b.s - a.s);
    let teams = Array.from({length: teamCount}, () => ({ members: [] }));
    let idx = 0, dir = 1;
    selected.forEach(p => { teams[idx].members.push(p); idx += dir; if(idx === teamCount || idx === -1) { dir *= -1; idx += dir; } });
    renderVSMode(teams);
  }

  // [수정] 가나다순 정렬 및 VS 레이아웃 렌더링
  function renderVSMode(teams) {
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    const grid = document.getElementById('vs-display-grid');
    grid.innerHTML = '';
    charts.forEach(c => c.destroy());
    charts = [];

    teams.forEach((t, i) => {
      // 명단 가나다순 정렬
      t.members.sort((a, b) => a.n.localeCompare(b.n, 'ko-KR'));

      const col = document.createElement('div');
      col.className = 'team-column';
      col.innerHTML = `
        <div class="team-box">
          <div class="section-title" style="margin-top:0; color:var(--primary-color);">SQUAD T${i+1}</div>
          <div class="drag-list" id="team-list-${i}"></div>
        </div>
        <div class="tactical-card">
          <div class="ovr-lbl">TEAM RATING</div><div class="ovr-val" id="ovr-${i}">--</div>
          <div class="chart-mini-box"><canvas id="radar-${i}"></canvas></div>
        </div>
      `;
      grid.appendChild(col);
      const listEl = document.getElementById(`team-list-${i}`);
      t.members.forEach(p => {
        const item = document.createElement('div');
        item.className = 'drag-item';
        item.dataset.score = p.s || 5;
        item.innerHTML = `${p.n}<span class="item-del" onclick="this.parentElement.remove(); autoAnalyze();">✕</span>`;
        listEl.appendChild(item);
      });
      new Sortable(listEl, { group: 'teams', animation: 150, onEnd: () => autoAnalyze() });
    });
    autoAnalyze();
  }

  function autoAnalyze() {
    charts.forEach(c => c.destroy());
    charts = [];
    document.querySelectorAll('.team-column').forEach((col, i) => {
      const items = col.querySelectorAll('.drag-item');
      let total = 0;
      items.forEach(it => total += parseFloat(it.dataset.score));
      const avg = items.length > 0 ? total / items.length : 0;
      const base = avg * 10;
      const stats = [base+5, base+2, base+7, base+3, base+1, base+4].map(s => Math.min(99, Math.floor(s)));
      const overall = items.length > 0 ? Math.floor(stats.reduce((a,b)=>a+b)/6) : 0;
      document.getElementById(`ovr-${i}`).innerText = overall;
      const ctx = document.getElementById(`radar-${i}`).getContext('2d');
      const chart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['AT','DF','SP','PS','ST','OR'],
          datasets: [{ data: stats, backgroundColor: 'rgba(16,185,129,0.2)', borderColor: '#10b981', borderWidth: 2, pointRadius: 0 }]
        },
        options: {
          scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#94a3b8', font: { size: 9, weight: 'bold' } } } },
          plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false
        }
      });
      charts.push(chart);
    });
  }

  function openAddPlayerModal() {
    const activeNames = Array.from(document.querySelectorAll('.drag-item')).map(el => el.childNodes[0].textContent.trim());
    const unchecked = masterPlayers.filter(p => !activeNames.includes(p.name));
    const box = document.getElementById('modal-player-list');
    box.innerHTML = '';
    unchecked.forEach(p => {
      const card = document.createElement('div'); card.className = 'player-card';
      card.onclick = () => { addLastMinutePlayer(p); closeModal(); };
      card.innerHTML = `<span>${p.name}</span>`;
      box.appendChild(card);
    });
    document.getElementById('add-modal').classList.remove('hidden');
  }

  function addLastMinutePlayer(p) {
    const list0 = document.getElementById('team-list-0');
    const item = document.createElement('div');
    item.className = 'drag-item';
    item.dataset.score = p.score || 5;
    item.innerHTML = `${p.name}<span class="item-del" onclick="this.parentElement.remove(); autoAnalyze();">✕</span>`;
    list0.appendChild(item);
    autoAnalyze();
  }

  function closeModal() { document.getElementById('add-modal').classList.add('hidden'); }

  function saveMatchToHistory(mode) {
    const finalTeams = [];
    document.querySelectorAll('.drag-list').forEach((list, idx) => {
      const members = Array.from(list.querySelectorAll('.drag-item')).map(el => el.childNodes[0].textContent.trim());
      finalTeams.push({ id: idx, members: members });
    });
    const matchObj = { id: activeMatch ? activeMatch.id : Date.now(), date: new Date().toLocaleDateString(), teams: finalTeams, rounds: (activeMatch && activeMatch.rounds.length > 0) ? activeMatch.rounds : [] };
    let saved = JSON.parse(localStorage.getItem('saved_matches') || '[]');
    saved = saved.filter(m => m.id !== matchObj.id);
    saved.push(matchObj);
    localStorage.setItem('saved_matches', JSON.stringify(saved));
    if(mode === 'dashboard') startDashboard(matchObj);
    else { alert("Tactics Saved!"); location.reload(); }
  }

  function renderSavedMatches() {
    const saved = JSON.parse(localStorage.getItem('saved_matches') || '[]');
    if(saved.length > 0) {
      document.getElementById('saved-matches-section').classList.remove('hidden');
      document.getElementById('saved-list').innerHTML = saved.map(m => `
        <div class="saved-match-card" onclick="loadSavedMatch(${m.id})" style="background:#f0fdf4; border:1px solid #dcfce7; border-radius:18px; padding:12px; margin-bottom:10px; cursor:pointer;">
          <div style="font-weight:900; color:#065f46; font-size:12px;">⚽ READY: ${m.date}</div>
        </div>
      `).join('');
    }
  }

  function loadSavedMatch(id) {
    const saved = JSON.parse(localStorage.getItem('saved_matches') || '[]');
    activeMatch = saved.find(m => m.id === id);
    if(activeMatch) {
      const teams = activeMatch.teams.map(t => ({ members: t.members.map(n => {
        const p = masterPlayers.find(mp => mp.name === n);
        return { n: n, s: p ? p.score : 5 };
      }) }));
      renderVSMode(teams);
    }
  }

  function startDashboard(match) {
    activeMatch = match;
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('result-page').classList.add('hidden');
    document.getElementById('match-page').classList.remove('hidden');
    if(activeMatch.rounds.length === 0) {
      const tc = activeMatch.teams.length;
      if(tc === 2) for(let i=1; i<=9; i++) activeMatch.rounds.push({ id: i, t1: 0, t2: 1, winner: null });
      else {
        const pattern = [[0,1], [1,2], [2,0]];
        for(let i=1; i<=9; i++) activeMatch.rounds.push({ id: i, t1: pattern[(i-1)%3][0], t2: pattern[(i-1)%3][1], winner: null });
      }
    }
    renderRoundList();
  }

  function renderRoundList() {
    const box = document.getElementById('round-list'); box.innerHTML = '';
    activeMatch.rounds.forEach(r => {
      const card = document.createElement('div'); card.className = 'match-card';
      card.innerHTML = `
        <div class="round-info">RD ${r.id}</div>
        <div class="vs-area">
          <div class="team-name" style="font-weight:900;">T${r.t1+1}</div>
          <div class="score-btns">
            <button class="s-btn ${r.winner==='t1'?'selected':''}" onclick="record(${r.id}, 't1')">WIN</button>
            <button class="s-btn ${r.winner==='draw'?'selected':''}" onclick="record(${r.id}, 'draw')">DRAW</button>
            <button class="s-btn ${r.winner==='t2'?'selected':''}" onclick="record(${r.id}, 't2')">WIN</button>
          </div>
          <div class="team-name" style="font-weight:900;">T${r.t2+1}</div>
        </div>`;
      box.appendChild(card);
    });
    updateLiveRanking();
  }

  function record(rid, res) { const r = activeMatch.rounds.find(x => x.id === rid); r.winner = (r.winner === res) ? null : res; renderRoundList(); }
  function updateLiveRanking() {
    const stats = activeMatch.teams.map((_, i) => ({ id: i+1, w:0, d:0, l:0, p:0 }));
    activeMatch.rounds.forEach(r => {
      if(!r.winner) return;
      if(r.winner === 't1') { stats[r.t1].w++; stats[r.t1].p+=3; stats[r.t2].l++; }
      else if(r.winner === 't2') { stats[r.t2].w++; stats[r.t2].p+=3; stats[r.t1].l++; }
      else { stats[r.t1].d++; stats[r.t1].p+=1; stats[r.t2].d++; stats[r.t2].p+=1; }
    });
    stats.sort((a,b) => b.p - a.p);
    document.getElementById('live-ranking').innerHTML = stats.map(s => `T${s.id}: ${s.w}W ${s.d}D ${s.l}L`).join(' | ');
  }

  async function finishMatch() {
    if(!confirm("Archive to Cloud?")) return;
    document.body.style.opacity = "0.5";
    const stats = activeMatch.teams.map((t, tid) => {
      let w=0, d=0, l=0, p=0;
      activeMatch.rounds.forEach(r => {
        if(r.winner === 't1' && r.t1 === tid) { w++; p+=3; }
        else if(r.winner === 't2' && r.t2 === tid) { w++; p+=3; }
        else if(r.winner === 'draw' && (r.t1 === tid || r.t2 === tid)) { d++; p+=1; }
        else if(r.winner && (r.t1 === tid || r.t2 === tid)) { l++; }
      });
      return { names: t.members.join(', '), record: `${w}W ${d}D ${l}L`, pts: p };
    });
    stats.sort((a,b) => b.pts - a.pts);
    const finalLog = { id: activeMatch.id, date: activeMatch.date, rank: stats.map((s, i) => ({ r: i+1, sfx: i===0?'st':i===1?'nd':'rd', names: s.names, record: s.record, pts: s.pts })), rounds: activeMatch.rounds };
    try { await fetch(SHEET_API_URL, { method: 'POST', body: JSON.stringify(finalLog) }); let saved = JSON.parse(localStorage.getItem('saved_matches') || '[]'); localStorage.setItem('saved_matches', JSON.stringify(saved.filter(m => m.id !== activeMatch.id))); alert("Archived!"); location.reload(); } catch (e) { alert("Error"); document.body.style.opacity = "1"; }
  }

  function renderHistory() {
    const box = document.getElementById('history-list');
    if (hData.length === 0) return;
    hData.sort((a,b) => b.id - a.id).forEach(h => {
      const div = document.createElement('div'); div.className = 'history-card';
      div.style.background = "#fff"; div.style.padding = "10px"; div.style.borderRadius = "12px"; div.style.marginBottom = "8px"; div.style.border = "1px solid #eee";
      let html = `<div style="font-weight:900; font-size:11px; margin-bottom:5px;">${h.date}</div>`;
      h.rank.forEach(rk => { html += `<div style="font-size:10px; margin-bottom:3px; display:flex; justify-content:space-between;"><span><b>${rk.r}${rk.sfx}</b> ${rk.names}</span><span style="color:var(--accent-color); font-weight:800;">${rk.pts}pt</span></div>`; });
      div.innerHTML = html; box.appendChild(div);
    });
  }

  function confirmReset() { if(confirm("Close Manager Pro?")) location.reload(); }
  function goBack() { location.reload(); }
  window.onload = fetchMasterData;
</script>
</body>
</html>
