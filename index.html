<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futsal Match Maker</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --primary-color: #1a237e; --accent-color: #00c853; --bg-color: #f8f9fa; --card-bg: #ffffff; --text-main: #212121; --text-sub: #757575; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; font-size: 14px; line-height: 1.6; }
    .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    header { text-align: center; margin-bottom: 30px; position: relative; }
    h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); margin: 0; letter-spacing: -0.5px; }
    #admin-status { position: absolute; right: 0; top: -10px; font-size: 10px; color: #ccc; cursor: pointer; padding: 10px; }
    
    /* 섹션 스타일 */
    .section-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text-sub); border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
    
    /* 관리자 데이터 관리 영역 */
    .admin-box { background: #fff5f5; border: 1px solid #ffe3e3; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .data-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .data-row input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    
    /* 참석자 선택 영역 */
    .attendance-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding: 5px; }
    .player-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
    .player-card.active { border-color: var(--accent-color); background: #f0fff4; box-shadow: 0 2px 4px rgba(0,200,83,0.1); }
    .player-card input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent-color); }
    
    .config-card { background: #f1f3f5; padding: 15px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 20px; }
    .config-item { flex: 1; }
    .config-item label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
    .config-item .val { font-size: 18px; font-weight: 800; color: var(--primary-color); }
    .config-item input { width: 60px; border: none; background: transparent; font-size: 18px; font-weight: 800; color: var(--primary-color); border-bottom: 2px solid #dee2e6; outline: none; }

    button { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-family: inherit; }
    .btn-guest { background: #546e7a; margin-top: 5px; font-size: 12px; padding: 10px; }
    .btn-save-data { background: var(--primary-color); font-size: 12px; padding: 8px; width: auto; margin: 0; }
    
    .team-card { background: #fff; border: 1px solid #f1f3f5; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .history-card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; font-size: 12px; }
    .rank-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; color: #fff; }
    .r1 { background: #ffd700; color: #000; }
    .r2 { background: #c0c0c0; color: #000; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <span id="admin-status" onclick="toggleAdmin()">Admin Login</span>
  <header><h1>Futsal Match Maker</h1></header>

  <div id="admin-page" class="hidden">
    <div class="section-title">
      <span>Player Database Management</span>
      <button class="btn-save-data" onclick="saveMasterData()">Save All Changes</button>
    </div>
    <div class="admin-box" id="master-list"></div>
    <button onclick="addMasterRow()" style="background:#666; font-size:12px; padding:8px;">+ Add New Player</button>
  </div>

  <div id="setup-page">
    <div class="config-card">
      <div class="config-item"><label>Attending</label><div class="val"><span id="att-count">0</span> People</div></div>
      <div class="config-item"><label>Teams</label><input type="number" id="t-count" value="2" min="2"></div>
    </div>

    <div class="section-title">Select Attendees (A-Z)</div>
    <div class="attendance-list" id="attendance-list"></div>
    
    <div class="section-title">Guests</div>
    <div id="guest-area" style="margin-bottom:20px;"></div>
    <button class="btn-guest" onclick="addGuest()">+ Add Guest</button>

    <button style="margin-top:30px; height:60px; font-size:16px;" onclick="makeTeams()">Generate Balanced Teams</button>
  </div>

  <div id="result-page" class="hidden">
    <header><h1 style="color: var(--accent-color);">Match Assignment</h1></header>
    <div id="team-results"></div>
    <button style="background: var(--accent-color);" onclick="saveHistory()">Save Rankings</button>
    <button style="background: #e9ecef; color: #495057;" onclick="goBack()">Back to List</button>
  </div>
