<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futsal Match Maker Pro</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --primary-color: #0f172a; --accent-color: #10b981; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --star-color: #fbbf24; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; font-size: 14px; }
    .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 25px 20px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    header { text-align: center; margin-bottom: 25px; }
    h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); margin: 0; letter-spacing: -1px; }
    .section-title { font-size: 12px; font-weight: 700; margin: 20px 0 12px; color: var(--text-sub); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; display: flex; justify-content: space-between; }
    
    /* Config & Selector */
    .config-card { background: #f8fafc; padding: 18px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    .match-type-selector { display: flex; gap: 8px; }
    .type-btn { flex: 1; padding: 12px 5px; border: 2px solid #e2e8f0; background: white; border-radius: 14px; cursor: pointer; font-weight: 800; color: var(--text-sub); transition: 0.2s; line-height: 1.3; }
    .type-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }
    .type-btn span { display: block; font-size: 10px; font-weight: 500; opacity: 0.8; margin-top: 2px; }

    /* Attendance List */
    .attendance-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 2px; }
    .player-card { background: #f8fafc; border: 2px solid #f1f5f9; padding: 12px; border-radius: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .player-card.active { border-color: var(--accent-color); background: #ecfdf5; }
    .player-card input { pointer-events: none; transform: scale(1.1); accent-color: var(--accent-color); }

    /* Buttons */
    button { background: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
    .btn-accent { background: var(--accent-color); height: 60px; font-size: 16px; }
    .btn-guest { background: #64748b; padding: 10px; font-size: 12px; margin-bottom: 15px; }

    /* Match Dashboard */
    .match-card { background: #f8fafc; border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .round-info { font-size: 11px; font-weight: 800; color: var(--accent-color); margin-bottom: 8px; }
    .vs-area { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .team-name { font-weight: 800; font-size: 15px; flex: 1; text-align: center; }
    .score-btns { display: flex; gap: 4px; flex: 1.5; }
    .s-btn { flex: 1; padding: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-size: 11px; font-weight: 700; cursor: pointer; }
    .s-btn.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }

    /* History */
    .history-card { background: #fff; border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; cursor: pointer; }
    .rank-row { display: flex; align-items: center; margin-bottom: 4px; }
    .rank-badge { width: 35px; font-size: 10px; font-weight: 900; color: var(--text-sub); }
    .del-btn { color: #cbd5e1; font-size: 10px; cursor: pointer; }

    .hidden { display: none !important; }
    .loading-msg { text-align: center; padding: 30px; color: var(--text-sub); }
  </style>
</head>
<body>

<div class="container">
  <div id="setup-page">
    <header><h1>Futsal Match Maker</h1></header>
    <div class="config-card">
      <div class="match-type-selector">
        <button id="btn-2team" class="type-btn active" onclick="setTeamCount(2)">VERSUS<span>(2-TEAM)</span></button>
        <button id="btn-3team" class="type-btn" onclick="setTeamCount(3)">TRI-MATCH<span>(3-TEAM)</span></button>
      </div>
      <div id="att-count" style="text-align:center; font-size:13px; font-weight:800; color:var(--accent-color); margin-top:15px;">0 Players Ready</div>
    </div>
    <div class="section-title">Checklist</div>
    <div id="loading" class="loading-msg">Fetching players...</div>
    <div class="attendance-list" id="attendance-list"></div>
    <div id="guest-area" style="margin: 10px 0;"></div>
    <button class="btn-guest" onclick="addGuest()">+ Add Guest</button>
    <button class="btn-accent" onclick="generateMatch()">Start Match Dashboard ⚡</button>
  </div>

  <div id="match-page" class="hidden">
    <header><h1 style="color:var(--accent-color);">Live Dashboard</h1></header>
    <div id="live-ranking" style="background:var(--primary-color); color:white; padding:15px; border-radius:20px; margin-bottom:20px; font-size:12px;"></div>
    <div class="section-title">Match Rounds (13m each)</div>
    <div id="round-list"></div>
    <button class="btn-accent" onclick="finishMatch()">Finish & Save Record 🏁</button>
    <button style="background:transparent; color:var(--text-sub); border:1px solid #e2e8f0;" onclick="confirmGoBack()">Reset Match</button>
  </div>

  <div style="margin-top: 40px;">
    <div class="section-title">Match History</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyuMHd-fAC1m-E_6exvPwKunMqFBvGTuCIxFT3A1RqW-Z0nsDYr_0kgFSP0495hC6OF/exec"; 
  
  let masterPlayers = [], guests = [], teamCount = 2, currentTeams = [], hData = JSON.parse(localStorage.getItem('f_history')) || [];
  let rounds = [], scores = {};

  /* 초기화 및 인원 설정 */
  function setTeamCount(val) {
    teamCount = val;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    val === 2 ? document.getElementById('btn-2team').classList.add('active') : document.getElementById('btn-3team').classList.add('active');
  }

  async function fetchMasterData() {
    try {
      const response = await fetch(SHEET_API_URL);
      masterPlayers = await response.json();
      document.getElementById('loading').classList.add('hidden');
      renderAttendanceList();
    } catch (e) { document.getElementById('loading').innerText = "Load failed."; }
  }

  function renderAttendanceList() {
    const box = document.getElementById('attendance-list'); box.innerHTML = '';
    masterPlayers.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
    masterPlayers.forEach(p => {
      const card = document.createElement('div'); card.className = 'player-card';
      card.onclick = () => { const cb = card.querySelector('.p-check'); cb.checked = !cb.checked; card.classList.toggle('active', cb.checked); updateCount(); };
      card.innerHTML = `<input type="checkbox" class="p-check" data-name="${p.name}" data-score="${p.score}"><span>${p.name}</span>`;
      box.appendChild(card);
    });
  }

  function addGuest() { guests.push(`Guest ${guests.length+1}`); renderGuests(); updateCount(); }
  function renderGuests() { document.getElementById('guest-area').innerHTML = guests.map((g, i) => `<div style="display:inline-block; background:#e2e8f0; padding:6px 12px; border-radius:10px; margin:4px; font-size:12px;">${g} <span style="cursor:pointer; color:#ef4444;" onclick="removeGuest(${i})">✕</span></div>`).join(''); }
  function removeGuest(i) { guests.splice(i, 1); renderGuests(); updateCount(); }
  function updateCount() { const count = document.querySelectorAll('.p-check:checked').length + guests.length; document.getElementById('att-count').innerText = count + " Players Ready"; }

  /* 경기 생성 로직 */
  function generateMatch() {
    let players = [];
    const selected = document.querySelectorAll('.p-check:checked');
    selected.forEach(cb => { players.push({ n: cb.dataset.name, s: parseInt(cb.dataset.score), p: 0 }); });
    const avg = players.length > 0 ? players.reduce((a,b)=>a+b.s,0)/players.length : 50;
    guests.forEach(g => players.push({ n: g, s: avg, p: 0 }));
    if(players.length < teamCount) return alert("인원이 부족합니다.");

    // 최근 경기 기반 섞기
    const recentH = hData.slice(0, 3);
    players.forEach(p1 => { players.forEach(p2 => { if (p1.n === p2.n) return; recentH.forEach(m => { m.rank.forEach(t => { if (t.names.includes(p1.n) && t.names.includes(p2.n)) p1.p += 15; }); }); }); });
    players = players.map(p => ({ ...p, w: p.s + (Math.random()*30-15) - p.p }));
    players.sort((a,b) => b.w - a.w);

    currentTeams = Array.from({length: teamCount}, () => ({ members: [], total: 0 }));
    let idx = 0, dir = 1;
    players.forEach(p => { currentTeams[idx].members.push(p.n); currentTeams[idx].total += p.s; idx += dir; if(idx === teamCount || idx === -1) { dir *= -1; idx += dir; } });

    // 라운드 구성
    rounds = [];
    if(teamCount === 2) {
      for(let i=1; i<=9; i++) rounds.push({ id: i, t1: 0, t2: 1, winner: null });
    } else {
      const pattern = [[0,1], [1,2], [2,0]]; // 순환 매치
      for(let i=1; i<=9; i++) rounds.push({ id: i, t1: pattern[(i-1)%3][0], t2: pattern[(i-1)%3][1], winner: null });
    }
    
    renderDashboard();
  }

  function renderDashboard() {
    document.getElementById('setup-page').classList.add('hidden');
    document.getElementById('match-page').classList.remove('hidden');
    updateLiveRanking();
    
    const box = document.getElementById('round-list'); box.innerHTML = '';
    rounds.forEach(r => {
      const card = document.createElement('div'); card.className = 'match-card';
      card.innerHTML = `
        <div class="round-info">ROUND ${r.id}</div>
        <div class="vs-area">
          <div class="team-name">T${r.t1+1}</div>
          <div class="score-btns">
            <button class="s-btn ${r.winner==='t1'?'selected':''}" onclick="record(${r.id}, 't1')">T1 WIN</button>
            <button class="s-btn ${r.winner==='draw'?'selected':''}" onclick="record(${r.id}, 'draw')">무</button>
            <button class="s-btn ${r.winner==='t2'?'selected':''}" onclick="record(${r.id}, 't2')">T2 WIN</button>
          </div>
          <div class="team-name">T${r.t2+1}</div>
        </div>`;
      box.appendChild(card);
    });
  }

  function record(roundId, result) {
    const r = rounds.find(x => x.id === roundId);
    r.winner = result;
    renderDashboard();
  }

  function updateLiveRanking() {
    let pts = currentTeams.map((_, i) => ({ id: i+1, p: 0 }));
    rounds.forEach(r => {
      if(r.winner === 't1') pts[r.t1].p += 3;
      else if(r.winner === 't2') pts[r.t2].p += 3;
      else if(r.winner === 'draw') { pts[r.t1].p += 1; pts[r.t2].p += 1; }
    });
    pts.sort((a,b) => b.p - a.p);
    document.getElementById('live-ranking').innerHTML = `<b>실시간 순위:</b> ` + pts.map(x => `T${x.id}(${x.p}점)`).join(' > ');
  }

  /* 종료 및 저장 */
  function finishMatch() {
    if(!confirm("경기를 종료하고 순위를 저장할까요?")) return;
    let pts = currentTeams.map((t, i) => ({ id: i, name: `Team ${i+1}`, p: 0, members: t.members.join(', ') }));
    rounds.forEach(r => {
      if(r.winner === 't1') pts[r.t1].p += 3;
      else if(r.winner === 't2') pts[r.t2].p += 3;
      else if(r.winner === 'draw') { pts[r.t1].p += 1; pts[r.t2].p += 1; }
    });
    pts.sort((a,b) => b.p - a.p);
    
    const finalRank = pts.map((x, i) => ({ r: i+1, sfx: i===0?'st':i===1?'nd':'rd', names: x.members, pts: x.p }));
    const log = { id: Date.now(), date: new Date().toLocaleDateString(), rank: finalRank, rounds: JSON.parse(JSON.stringify(rounds)) };
    
    hData.unshift(log);
    localStorage.setItem('f_history', JSON.stringify(hData));
    location.reload();
  }

  function renderHistory() {
    const box = document.getElementById('history-list'); box.innerHTML = hData.length === 0 ? "<div class='loading-msg'>No records.</div>" : "";
    hData.forEach(h => {
      const div = document.createElement('div'); div.className = 'history-card';
      div.onclick = () => showDetail(h);
      let html = `<div style="font-weight:800; margin-bottom:10px; display:flex; justify-content:space-between;">📅 ${h.date} <span class="del-btn" onclick="secureDelete(event, ${h.id})">Delete</span></div>`;
      h.rank.forEach(rk => {
        html += `<div class="rank-row"><span class="rank-badge rank-${rk.r}">${rk.r}${rk.sfx}</span> <b style="flex:1;">${rk.names}</b> <span style="font-size:10px; color:var(--accent-color);">${rk.pts}pt</span></div>`;
      });
      div.innerHTML = html; box.appendChild(div);
    });
  }

  function showDetail(h) {
    let msg = `[ ${h.date} 경기 세부 결과 ]\n\n`;
    h.rounds.forEach(r => {
      let res = r.winner === 't1' ? `T${r.t1+1} 승` : r.winner === 't2' ? `T${r.t2+1} 승` : r.winner === 'draw' ? '무승부' : '미경기';
      msg += `RD ${r.id}: T${r.t1+1} vs T${r.t2+1} (${res})\n`;
    });
    alert(msg);
  }

  function secureDelete(e, id) { e.stopPropagation(); const pw = prompt("Password:"); if (pw && (parseInt(pw) + 77 == 1110100)) { hData = hData.filter(h => h.id !== id); localStorage.setItem('f_history', JSON.stringify(hData)); renderHistory(); } }
  function confirmGoBack() { if(confirm("진행중인 데이터가 사라집니다. 취소할까요?")) location.reload(); }
  window.onload = () => { fetchMasterData(); renderHistory(); };
</script>
</body>
</html>
